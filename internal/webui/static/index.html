<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Phragma</title>
<link rel="icon" href="assets/phragma-logomark.svg">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<a class="skip-link" href="#content">Skip to workspace</a>
<div id="app" class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="brand-name">
        <img src="assets/phragma-wordmark.svg" alt="Phragma">
      </span>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      <button class="ghost-btn" id="palette-hint" type="button" title="Command palette" aria-label="Open command palette">
        <span>Search</span><kbd>⌘K</kbd>
      </button>
      <div class="conn" id="conn"><span class="dot"></span><span id="conn-text">connecting…</span></div>
    </div>
  </aside>
  <button class="sidebar-scrim" id="sidebar-scrim" type="button" aria-label="Close navigation menu" hidden></button>

  <div class="main">
    <header class="topbar">
      <button class="icon-btn" id="menu-toggle" type="button" title="Toggle menu" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
      </button>
      <div class="crumb" id="crumb">Dashboard</div>
      <div class="topbar-spacer"></div>
      <button class="search-btn" id="open-palette" type="button" title="Search and commands (Command K)" aria-label="Open search and command palette">
        <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Jump to…</span><kbd>⌘K</kbd>
      </button>
      <button class="icon-btn" id="open-diagnostics" type="button" title="API diagnostic console (Command Shift P)" aria-label="Open API diagnostic console"></button>
      <button class="icon-btn" id="open-automation" type="button" title="API / CLI context" aria-label="Open API and CLI context"></button>
      <button class="icon-btn" id="theme-toggle" type="button" title="Toggle theme" aria-label="Toggle theme"></button>
    </header>

    <div class="candidate-bar" id="candidate-bar" hidden></div>
    <div class="runtime-banner" id="runtime-banner" hidden></div>

    <main class="content" id="content" tabindex="-1"><div class="loading">Loading…</div></main>
  </div>
</div>

<div class="drawer-scrim" id="drawer-scrim" hidden></div>
<aside class="drawer" id="drawer" hidden></aside>

<div class="palette-scrim" id="palette-scrim" hidden>
  <div class="palette" role="dialog" aria-modal="true" aria-label="Command palette">
    <input id="palette-input" type="text" autocomplete="off" spellcheck="false" role="combobox" aria-expanded="false" aria-controls="palette-results" aria-activedescendant="" placeholder="Search rules, objects, pages, actions…">
    <div class="palette-results" id="palette-results" role="listbox"></div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
