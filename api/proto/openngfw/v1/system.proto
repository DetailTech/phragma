  string detail = 2;
  string sysctl_config_path = 3;
  repeated KernelTuningCheck checks = 4;
}

message KernelTuningCheck {
  string name = 1;
  string key = 2;
  string current = 3;
  string recommended = 4;
  string state = 5;
  string detail = 6;
}

message EbpfDataplaneStatus {
  string state = 1;
  string detail = 2;
  // Host/tool/kernel prerequisites needed before any first-party eBPF dataplane
  // can be compiled or inspected.
  repeated EbpfProbe probes = 3;
  // planned, ready, degraded, or active. This is attach readiness only; it is
  // not proof that eBPF is the active dataplane.
  string attach_state = 4;
  string attach_detail = 5;
  // Probe results for XDP/tc attachment prerequisites.
  repeated EbpfProbe attach_probes = 6;
  // planned or active. The v2-mixed implementation exposes plan-only renderer
  // scaffolding while nftables remains the production renderer.
  string renderer_state = 7;
  string renderer_detail = 8;
  repeated string supported_hooks = 9;
  repeated string blockers = 10;
  repeated EbpfAttachment attachments = 11;
  repeated EbpfArtifact artifacts = 12;
  string evidence_collected_at = 13;
  string evidence_scope = 14;
}

message EbpfProbe {
  string name = 1;
  string key = 2;
  string state = 3;
  string detail = 4;
}

message EbpfAttachment {
  string interface = 1;
  string hook = 2;
  string state = 3;
  string program_id = 4;
  string program_name = 5;
  string pinned_path = 6;
  string detail = 7;
}

message EbpfArtifact {
  string name = 1;
  string kind = 2;
  string path = 3;
  string sha256 = 4;
  string state = 5;
  string detail = 6;
}

message ManagementPlaneStatus {
  bool tls_enabled = 1;
  bool auth_enabled = 2;
  bool rate_limit_enabled = 3;
  uint32 rate_limit_requests_per_minute = 4;
  uint32 rate_limit_burst = 5;
  uint64 http_max_body_bytes = 6;
  uint32 http_max_header_bytes = 7;
  uint32 grpc_max_recv_bytes = 8;
  uint32 grpc_max_send_bytes = 9;
  string http_read_header_timeout = 10;
  string http_read_timeout = 11;
  string http_write_timeout = 12;
  string http_idle_timeout = 13;
  repeated string trusted_proxy_cidrs = 14;
  string rate_limit_client_identity = 15;
}

message HostResourceStatus {
  string state = 1;
  string detail = 2;
  uint32 cpu_count = 3;
  double load1 = 4;
  double load5 = 5;
  double load15 = 6;
  double load1_per_cpu = 7;
  uint64 memory_total_bytes = 8;
  uint64 memory_available_bytes = 9;
  double memory_used_percent = 10;
  repeated HostInterfaceCounter interfaces = 11;
}

message HostInterfaceCounter {
  string name = 1;
  string state = 2;
  string detail = 3;
  uint64 rx_bytes = 4;
  uint64 tx_bytes = 5;
  uint64 rx_packets = 6;
  uint64 tx_packets = 7;
  uint64 rx_errors = 8;
  uint64 tx_errors = 9;
  uint64 rx_drops = 10;
  uint64 tx_drops = 11;
}

message InspectionStatus {
  // ready, disabled, degraded, failed-open, failed-closed, or unknown.
  string state = 1;
  string detail = 2;
  bool ids_enabled = 3;
  IdsMode ids_mode = 4;
  IdsFailureBehavior failure_behavior = 5;
  string inspection_state = 6;
  string engine_name = 7;
  string engine_mode = 8;
  string engine_state = 9;
  bool engine_required = 10;
  bool bypass_possible = 11;
  string bypass_reason = 12;
  string degraded_behavior = 13;
}

message StatusWarning {
  string severity = 1;
  string message = 2;
  string action = 3;
}
