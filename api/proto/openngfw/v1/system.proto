// OpenNGFW canonical API — v1 skeleton.
//
// The gRPC API is the seam and the contract (build plan §3). Everything —
// CLI, UI, GitOps, future fleet controller — is a client of this API.
// The policy model protos land in M1; M0 ships only the system surface.

syntax = "proto3";

package openngfw.v1;

import "google/api/annotations.proto";
import "google/api/httpbody.proto";
import "google/protobuf/struct.proto";
import "openngfw/v1/ids.proto";
import "openngfw/v1/policy.proto";
import "openngfw/v1/policy_service.proto";
import "openngfw/v1/telemetry.proto";

option go_package = "github.com/detailtech/oss-ngfw/api/gen/openngfw/v1;openngfwv1";

// SystemService exposes daemon identity and health.
service SystemService {
  // GetVersion reports the running controld build.
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse) {
    option (google.api.http) = {get: "/v1/system/version"};
  }

  // GetStatus reports the daemon's runtime posture and managed engine surface.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse) {
    option (google.api.http) = {get: "/v1/system/status"};
  }

  // ProveNetworkPath samples server-side kernel route and passive VPN runtime
  // evidence for one representative tunnel path. It is read-only and never
  // sends probe traffic or accepts arbitrary command input.
  rpc ProveNetworkPath(ProveNetworkPathRequest) returns (ProveNetworkPathResponse) {
    option (google.api.http) = {
      post: "/v1/system/network-path:prove"
      body: "*"
    };
  }

  // GetTelemetryExportStatus reports the running policy telemetry export
  // posture without sending test events, dialing remote sinks, or mutating the
  // host. It is the passive server-side source for GUI/CLI evidence workflows.
  rpc GetTelemetryExportStatus(GetTelemetryExportStatusRequest) returns (GetTelemetryExportStatusResponse) {
    option (google.api.http) = {get: "/v1/system/telemetry/exports/status"};
  }

  // VerifyTelemetryExport emits one bounded synthetic JSON proof event to a
  // configured running-policy telemetry export sink. It does not verify
  // ClickHouse row delivery or receiver-side SIEM custody.
  rpc VerifyTelemetryExport(VerifyTelemetryExportRequest) returns (VerifyTelemetryExportResponse) {
    option (google.api.http) = {
      post: "/v1/system/telemetry/exports:verify"
      body: "*"
    };
  }

  // ListSystemLogs returns a bounded, redacted view of node-local appliance and
  // engine log files from the configured OpenNGFW log root. Clients can filter
  // but cannot choose filesystem paths.
  rpc ListSystemLogs(ListSystemLogsRequest) returns (ListSystemLogsResponse) {
    option (google.api.http) = {get: "/v1/system/logs"};
  }

  // CheckRuntimeReadiness evaluates the server-side runtime blockers that
  // require explicit acknowledgement before commit or rollback. It is read-only
  // and uses the same policy-aware readiness logic enforced by PolicyService
  // live apply.
  rpc CheckRuntimeReadiness(CheckRuntimeReadinessRequest) returns (CheckRuntimeReadinessResponse) {
    option (google.api.http) = {
      post: "/v1/system/runtime-readiness:check"
      body: "*"
    };
  }

  // GetHighAvailabilityStatus reports the configured active/passive HA posture
  // and policy recovery metadata. It is read-only.
  rpc GetHighAvailabilityStatus(GetHighAvailabilityStatusRequest) returns (GetHighAvailabilityStatusResponse) {
    option (google.api.http) = {get: "/v1/system/ha/status"};
  }

  // PullHighAvailabilityPolicy lets a passive node manually pull the active
  // peer's running policy, validate it locally, and apply it through the same
  // durable policy apply path used by commit and rollback.
  rpc PullHighAvailabilityPolicy(PullHighAvailabilityPolicyRequest) returns (PullHighAvailabilityPolicyResponse) {
    option (google.api.http) = {
      post: "/v1/system/ha/policy:pull"
      body: "*"
    };
  }

  // ActivateHighAvailabilityFailover marks a passive node active after the
  // operator confirms manual failover. It persists only local control-plane HA
  // state and audit evidence; transport cutover, peer fencing, and connection
  // sync remain external controls until dedicated integrations are added.
  rpc ActivateHighAvailabilityFailover(ActivateHighAvailabilityFailoverRequest) returns (ActivateHighAvailabilityFailoverResponse) {
    option (google.api.http) = {
      post: "/v1/system/ha/failover:activate"
      body: "*"
    };
  }

  // GetReleaseAcceptanceStatus reports release-gate evidence state without
  // mutating the host or assembling a release manifest.
  rpc GetReleaseAcceptanceStatus(GetReleaseAcceptanceStatusRequest) returns (GetReleaseAcceptanceStatusResponse) {
    option (google.api.http) = {get: "/v1/system/release-acceptance/status"};
  }

  // GetSupportBundle collects a redacted, read-only diagnostic bundle from the
  // server side so GUI, CLI, and automation clients share one evidence shape.
  rpc GetSupportBundle(GetSupportBundleRequest) returns (GetSupportBundleResponse) {
    option (google.api.http) = {get: "/v1/system/support-bundle"};
  }

  // GetIdentity reports the current API actor and role.
  rpc GetIdentity(GetIdentityRequest) returns (GetIdentityResponse) {
    option (google.api.http) = {get: "/v1/system/identity"};
  }

  // CreateStepUpChallenge issues a short-lived one-time token for a named
  // privileged action. This is a functional re-confirmation guardrail; real
  // MFA/IdP-backed step-up remains production hardening.
  rpc CreateStepUpChallenge(CreateStepUpChallengeRequest) returns (CreateStepUpChallengeResponse) {
    option (google.api.http) = {
      post: "/v1/system/access-administration/step-up"
      body: "*"
    };
  }

  // GetAccessAdministration reports RBAC and browser SSO posture for
  // administrators. Inventory never serializes token, secret, or session
  // material; local user create/rotate responses return generated tokens only
  // once.
  rpc GetAccessAdministration(GetAccessAdministrationRequest) returns (GetAccessAdministrationResponse) {
    option (google.api.http) = {get: "/v1/system/access-administration"};
  }

  // RunOIDCPreflight verifies browser SSO readiness without changing IdP
  // configuration or serializing client secrets, redirect URLs, cookies, or
  // provider tokens.
  rpc RunOIDCPreflight(RunOIDCPreflightRequest) returns (RunOIDCPreflightResponse) {
    option (google.api.http) = {
      post: "/v1/system/access-administration/oidc:preflight"
      body: "*"
    };
  }

  // GetOIDCProviderConfig reports the node-local browser SSO provider
  // configuration without returning client secrets or secret file paths.
  rpc GetOIDCProviderConfig(GetOIDCProviderConfigRequest) returns (GetOIDCProviderConfigResponse) {
    option (google.api.http) = {get: "/v1/system/access-administration/oidc/config"};
  }

  // ValidateOIDCProviderConfig validates a proposed browser SSO provider
  // configuration without changing the active runtime authenticator.
  rpc ValidateOIDCProviderConfig(ValidateOIDCProviderConfigRequest) returns (ValidateOIDCProviderConfigResponse) {
    option (google.api.http) = {
      post: "/v1/system/access-administration/oidc/config:validate"
      body: "*"
    };
  }

  // SetOIDCProviderConfig writes the node-local browser SSO provider config,
  // replaces the active runtime authenticator, and revokes existing OIDC
  // browser sessions.
  rpc SetOIDCProviderConfig(SetOIDCProviderConfigRequest) returns (SetOIDCProviderConfigResponse) {
    option (google.api.http) = {
      put: "/v1/system/access-administration/oidc/config"
      body: "*"
    };
  }

  // DisableOIDCProvider disables browser SSO provider configuration, clears the
  // runtime authenticator, and revokes existing OIDC browser sessions.
  rpc DisableOIDCProvider(DisableOIDCProviderRequest) returns (DisableOIDCProviderResponse) {
    option (google.api.http) = {
      post: "/v1/system/access-administration/oidc/config:disable"
      body: "*"
    };
  }

  // GetSAMLProviderConfig reports the node-local SAML browser SSO provider
  // configuration without returning secret material.
  rpc GetSAMLProviderConfig(GetSAMLProviderConfigRequest) returns (GetSAMLProviderConfigResponse) {
    option (google.api.http) = {get: "/v1/system/access-administration/saml/config"};
  }

  // ValidateSAMLProviderConfig validates a proposed SAML browser SSO provider
  // configuration without changing runtime login/session behavior.
  rpc ValidateSAMLProviderConfig(ValidateSAMLProviderConfigRequest) returns (ValidateSAMLProviderConfigResponse) {
    option (google.api.http) = {
      post: "/v1/system/access-administration/saml/config:validate"
      body: "*"
    };
  }

  // SetSAMLProviderConfig writes and activates the node-local SAML browser SSO
  // provider configuration through the audited runtime lifecycle.
  rpc SetSAMLProviderConfig(SetSAMLProviderConfigRequest) returns (SetSAMLProviderConfigResponse) {
    option (google.api.http) = {
      put: "/v1/system/access-administration/saml/config"
      body: "*"
    };
  }

  // DisableSAMLProvider disables persisted SAML provider configuration.
  rpc DisableSAMLProvider(DisableSAMLProviderRequest) returns (DisableSAMLProviderResponse) {
    option (google.api.http) = {
      post: "/v1/system/access-administration/saml/config:disable"
      body: "*"
    };
  }

  // CreateLocalUser adds an enabled local users-file entry and returns the
  // generated bearer token once. The stored users file receives only a
  // sha256:<digest> token_hash.
  rpc CreateLocalUser(CreateLocalUserRequest) returns (CreateLocalUserResponse) {
    option (google.api.http) = {
      post: "/v1/system/access-administration/local-users"
      body: "*"
    };
  }

  // UpdateLocalUser changes local users-file metadata such as role. Token
  // material is never accepted through this endpoint.
  rpc UpdateLocalUser(UpdateLocalUserRequest) returns (UpdateLocalUserResponse) {
    option (google.api.http) = {
      patch: "/v1/system/access-administration/local-users/{name}"
      body: "*"
    };
  }

  // RotateLocalUserToken replaces one local user's token_hash and returns the
  // generated bearer token once.
  rpc RotateLocalUserToken(RotateLocalUserTokenRequest) returns (RotateLocalUserTokenResponse) {
    option (google.api.http) = {
      post: "/v1/system/access-administration/local-users/{name}:rotate-token"
      body: "*"
    };
  }

  // DisableLocalUser disables one local users-file entry while preserving an
  // audit-visible inventory row.
  rpc DisableLocalUser(DisableLocalUserRequest) returns (DisableLocalUserResponse) {
    option (google.api.http) = {
      post: "/v1/system/access-administration/local-users/{name}:disable"
      body: "*"
    };
  }

  // RevokeAccessSession invalidates one active browser SSO session by the
  // non-secret session_id returned from GetAccessAdministration.
  rpc RevokeAccessSession(RevokeAccessSessionRequest) returns (RevokeAccessSessionResponse) {
    option (google.api.http) = {
      post: "/v1/system/access-administration/sessions/{session_id}:revoke"
      body: "*"
    };
  }

  // TuneHost previews, writes, or applies the OpenNGFW host sysctl profile.
  // This is an explicit host mutation, separate from policy commit/rollback.
  rpc TuneHost(TuneHostRequest) returns (TuneHostResponse) {
    option (google.api.http) = {
      post: "/v1/system/tune"
      body: "*"
    };
  }

  // PlanPacketCapture validates capture scope and returns a bounded tcpdump
  // command without mutating the host. This lets UI/CLI clients preview the
  // exact diagnostic action before requesting an audited capture.
  rpc PlanPacketCapture(PlanPacketCaptureRequest) returns (PlanPacketCaptureResponse) {
    option (google.api.http) = {
      post: "/v1/system/packet-captures/plan"
      body: "*"
    };
  }

  // ListPacketCaptures returns recent completed pcap artifacts from the
  // configured capture directory. It returns metadata and safe download links;
  // pcap bytes are only returned by DownloadPacketCapture.
  rpc ListPacketCaptures(ListPacketCapturesRequest) returns (ListPacketCapturesResponse) {
    option (google.api.http) = {get: "/v1/system/packet-captures"};
  }

  // StartPacketCapture runs one bounded packet capture on the firewall host.
  // It is a privileged diagnostic action: callers must acknowledge it, RBAC
  // requires admin, and every attempt is written to the audit log.
  rpc StartPacketCapture(StartPacketCaptureRequest) returns (StartPacketCaptureResponse) {
    option (google.api.http) = {
      post: "/v1/system/packet-captures"
      body: "*"
    };
  }

  // DownloadPacketCapture returns one completed pcap artifact as binary
  // application/vnd.tcpdump.pcap content. The id is the safe artifact_id
  // returned by ListPacketCaptures or StartPacketCapture.
  rpc DownloadPacketCapture(DownloadPacketCaptureRequest) returns (google.api.HttpBody) {
    option (google.api.http) = {get: "/v1/system/packet-captures/{id}/download"};
  }

  // SetPacketCaptureRetention records non-destructive retention metadata for a
  // completed pcap artifact. It updates only the artifact sidecar; lifecycle
  // pruning, legal hold, custody, and tamper-proof retention remain separate
  // hardening controls.
  rpc SetPacketCaptureRetention(SetPacketCaptureRetentionRequest) returns (SetPacketCaptureRetentionResponse) {
    option (google.api.http) = {
      post: "/v1/system/packet-captures/{id}:set-retention"
      body: "*"
    };
  }
}

message GetVersionRequest {}

message GetVersionResponse {
  // Semantic version or "dev" for unreleased builds.
  string version = 1;
  // VCS commit hash the binary was built from.
  string commit = 2;
  // RFC 3339 build timestamp.
  string build_date = 3;
}

message GetStatusRequest {}

message GetTelemetryExportStatusRequest {}

message VerifyTelemetryExportRequest {
  // Optional configured export name. Empty selects the first enabled export.
  string export_name = 1;
  // Optional configured export type when name is omitted.
  TelemetryExportType type = 2;
  // Optional configured target when name is omitted.
  string target = 3;
  // Operator-visible reason or ticket context for the synthetic proof event.
  string reason = 4;
  // Required acknowledgement because this writes/sends one synthetic telemetry
  // event to a configured export sink.
  bool ack_test_event = 5;
}

message VerifyTelemetryExportResponse {
  string schema_version = 1;
  string generated_at = 2;
  // delivered, written, simulation, invalid, failed, or unavailable.
  string state = 3;
  string detail = 4;
  uint64 running_policy_version = 5;
  TelemetryExportProof proof = 6;
  repeated string warnings = 7;
}

message TelemetryExportProof {
  string proof_id = 1;
  string export_name = 2;
  TelemetryExportType type = 3;
  string protocol = 4;
  string target = 5;
  uint64 bytes = 6;
  string event_hash = 7;
  string evidence = 8;
}

message ListSystemLogsRequest {
  // Zero uses the server default. The server caps the value.
  uint32 limit = 1;
  // Source facet: system, engine, audit, dataplane, or all/empty.
  string source = 2;
  // Optional engine name such as suricata, vector, frr, wireguard, or nftables.
  string engine = 3;
  // Severity facet: debug, info, notice, warn, error, critical, or all/empty.
  string severity = 4;
  // Case-insensitive substring match after server-side redaction.
  string query = 5;
  // RFC 3339 lower bound when log lines carry parseable timestamps.
  string since = 6;
  // RFC 3339 upper bound when log lines carry parseable timestamps.
  string until = 7;
}

message ListSystemLogsResponse {
  string schema_version = 1;
  string generated_at = 2;
  repeated SystemLogEntry entries = 3;
  SystemLogSummary summary = 4;
}

message SystemLogEntry {
  string id = 1;
  string timestamp = 2;
  string source = 3;
  string engine = 4;
  string severity = 5;
  string message = 6;
  string facility = 7;
  string file = 8;
  uint32 line = 9;
}

message SystemLogSummary {
  uint32 scanned_files = 1;
  uint32 scanned_lines = 2;
  uint32 matched_lines = 3;
  bool truncated = 4;
  repeated string sources = 5;
  repeated string severities = 6;
  repeated string engines = 7;
  repeated string warnings = 8;
}

message GetTelemetryExportStatusResponse {
  string schema_version = 1;
  string generated_at = 2;
  // disabled, configured, ready, degraded, or unknown.
  string state = 3;
  string detail = 4;
  bool telemetry_enabled = 5;
  uint64 running_policy_version = 6;
  TelemetryVectorRuntimeStatus vector = 7;
  TelemetryClickHouseSinkStatus clickhouse = 8;
  repeated TelemetryExportSinkStatus exports = 9;
  repeated StatusWarning warnings = 10;
}

message TelemetryVectorRuntimeStatus {
  string state = 1;
  string detail = 2;
}

message TelemetryClickHouseSinkStatus {
  bool configured = 1;
  string endpoint = 2;
  string database = 3;
  string events_table = 4;
  string alerts_table = 5;
  string evidence_state = 6;
  string evidence_detail = 7;
}

message TelemetryExportSinkStatus {
  string name = 1;
  bool configured = 2;
  TelemetryExportType type = 3;
  string target = 4;
  string protocol = 5;
  string evidence_state = 6;
  string evidence_detail = 7;
  TelemetryLocalFileEvidence file = 8;
}

message TelemetryLocalFileEvidence {
  string path = 1;
  bool present = 2;
  uint64 size_bytes = 3;
  string modified_at = 4;
  string error = 5;
}

message CheckRuntimeReadinessRequest {
  // Policy that would become live if the reviewed action proceeds.
  Policy target_policy = 1;
  // Policy currently live before the reviewed action.
  Policy running_policy = 2;
  // Operator action being reviewed, usually "commit" or "rollback".
  string operation = 3;
}

message CheckRuntimeReadinessResponse {
  string schema_version = 1;
  string generated_at = 2;
  string operation = 3;
  string label = 4;
  string cls = 5;
  bool requires_ack = 6;
  string detail = 7;
  repeated RuntimeReadinessItem items = 8;
  repeated string warnings = 9;
}

message RuntimeReadinessItem {
  string id = 1;
  string level = 2;
  string badge = 3;
  string title = 4;
  string detail = 5;
  string href = 6;
  string command = 7;
}

message GetHighAvailabilityStatusRequest {}

message GetHighAvailabilityStatusResponse {
  string schema_version = 1;
  string generated_at = 2;
  HighAvailabilityStatus status = 3;
}

message PullHighAvailabilityPolicyRequest {
  // Required audit comment explaining why this passive node is pulling policy.
  string comment = 1;
  // Required acknowledgement that the operator intends to replace the local
  // running policy from the active peer.
  bool ack_pull = 2;
  // Passed through to the normal policy apply path for high-risk changes.
  bool ack_risk = 3;
  // Passed through to the normal policy apply path for runtime readiness
  // warnings.
  bool ack_runtime = 4;
}

message PullHighAvailabilityPolicyResponse {
  uint64 version = 1;
  uint64 previous_version = 2;
  VersionInfo version_info = 3;
  HighAvailabilityStatus before = 4;
  HighAvailabilityStatus after = 5;
  uint64 peer_version = 6;
  string peer_artifact_set_sha256 = 7;
  string detail = 8;
}

message ActivateHighAvailabilityFailoverRequest {
  // Required audit comment explaining why this passive node is being marked
  // active.
  string comment = 1;
  // Required acknowledgement that this marks the local passive node active.
  bool ack_failover = 2;
  // Required acknowledgement that traffic/VIP/route cutover is external to
  // this API call.
  bool ack_external_cutover = 3;
  // Required acknowledgement that peer fencing is external to this API call.
  bool ack_external_fencing = 4;
  // Required for authenticated callers because this is a privileged failover
  // state transition.
  string step_up_token = 5;
}

message ActivateHighAvailabilityFailoverResponse {
  string schema_version = 1;
  string activated_at = 2;
  HighAvailabilityStatus before = 3;
  HighAvailabilityStatus after = 4;
  uint64 running_policy_version = 5;
  uint64 last_known_good_version = 6;
  string detail = 7;
}

message GetReleaseAcceptanceStatusRequest {}

message GetSupportBundleRequest {
  // Number of policy versions to include. Zero uses the server default.
  uint32 version_limit = 1;
  // Number of audit entries to include. Zero uses the server default.
  uint32 audit_limit = 2;
  // Number of alerts, flows, and sessions to include. Zero uses the server default.
  uint32 event_limit = 3;
}

message GetSupportBundleResponse {
  string schema_version = 1;
  string collected_at = 2;
  SupportBundleCollector collector = 3;
  map<string, SupportBundleEndpoint> endpoints = 4;
  SupportBundleSummary summary = 5;
}

message SupportBundleCollector {
  string type = 1;
  string name = 2;
  string version = 3;
}

message SupportBundleEndpoint {
  bool ok = 1;
  google.protobuf.Struct data = 2;
  string error = 3;
}

message SupportBundleSummary {
  string runtime_version = 1;
  string running_policy_version = 2;
  string active_dataplane = 3;
  string conntrack_state = 4;
  double conntrack_usage_percent = 5;
  uint64 conntrack_entries = 6;
  uint64 conntrack_max_entries = 7;
  string candidate_validation = 8;
  string candidate_impact = 9;
  bool candidate_has_candidate = 10;
  bool candidate_dirty = 11;
  uint64 candidate_running_version = 12;
  uint32 candidate_change_count = 13;
  string session_state = 14;
  int32 session_count = 15;
  int32 alert_count = 16;
  int32 flow_count = 17;
  int32 feed_count = 18;
  int32 enabled_feeds = 19;
  int32 content_package_count = 20;
  int32 verified_content_packages = 21;
  int32 content_package_blockers = 22;
  string release_acceptance_state = 23;
  bool release_acceptance_ready = 24;
  bool release_acceptance_manifest_present = 25;
  uint32 release_acceptance_missing = 26;
  uint32 release_acceptance_invalid = 27;
  uint32 release_acceptance_not_applicable = 28;
  uint32 release_acceptance_todo = 29;
  int32 release_acceptance_problems = 30;
  int32 release_acceptance_next_actions = 31;
  int32 release_acceptance_next_commands = 32;
  string audit_integrity = 33;
  uint32 audit_entry_count = 34;
  string latest_audit_hash = 35;
  int32 critical_warnings = 36;
  int32 warnings = 37;
  int32 blocked_engines = 38;
  repeated string failed_endpoints = 39;
  bool release_acceptance_recordability_ready = 40;
  int32 release_acceptance_recordability_problems = 41;
  int32 release_acceptance_dirty_source_paths = 42;
  uint32 release_acceptance_truncated_dirty_source_count = 43;
  string telemetry_export_state = 44;
  bool telemetry_export_enabled = 45;
  string telemetry_export_vector_state = 46;
  int32 telemetry_export_sink_count = 47;
  int32 telemetry_export_observed_sink_count = 48;
  string telemetry_export_clickhouse_evidence = 49;
  int32 telemetry_export_warnings = 50;
}

message GetReleaseAcceptanceStatusResponse {
  string schema_version = 1;
  string generated_at = 2;
  string manifest_path = 3;
  string evidence_dir = 4;
  bool manifest_present = 5;
  bool ready = 6;
  string state = 7;
  ReleaseAcceptanceStatusSummary summary = 8;
  repeated string problems = 9;
  repeated ReleaseAcceptanceCheckStatus checks = 10;
  // Advisory checkout preflight for recording evidence from the current source
  // tree. This is not release evidence and does not affect ready/check state.
  ReleaseAcceptanceRecordabilityStatus recordability = 11;
}

message ReleaseAcceptanceStatusSummary {
  uint32 passed = 1;
  uint32 recorded = 2;
  uint32 missing = 3;
  uint32 invalid = 4;
  uint32 not_applicable = 5;
  uint32 todo = 6;
}

message ReleaseAcceptanceCheckStatus {
  string name = 1;
  string state = 2;
  string artifact = 3;
  string evidence_path = 4;
  string ran_at = 5;
  string detail = 6;
  // Evidence command from the recorded artifact. Empty when evidence has not
  // been recorded.
  repeated string command = 7;
  repeated string problems = 8;
  // Human-readable remediation guidance for the current state. This is not
  // evidence and must not be treated as proof that a check passed.
  string next_action = 9;
  // Copyable argv for the next evidence-recording step when one is safe to
  // suggest. Placeholder arguments must be replaced before running.
  repeated string next_command = 10;
  string benchmark_summary = 11;
}

message ReleaseAcceptanceRecordabilityStatus {
  // Mirrors releaseacceptance.RecordabilityStatus.
  bool ready = 1;
  string git_head = 2;
  string record_commit = 3;
  repeated string allowed_dirty_paths = 4;
  repeated string dirty_source_paths = 5;
  repeated string problems = 6;
  // Deprecated compatibility field for existing support-bundle summaries.
  // The status API now returns the full dirty_source_paths list.
  uint32 truncated_dirty_source_count = 7 [deprecated = true];
  repeated string stale_evidence_paths = 8;
}

message TuneHostRequest {
  // "appliance" for the conservative baseline or "throughput" for
  // high-bandwidth / high-connection-churn forwarding headroom.
  string profile = 1;
  // Write the persistent sysctl profile to sysctl_config_path.
  bool write = 2;
  // Apply exposed sysctl keys to the live kernel.
  bool apply = 3;
  // Required when write or apply is true.
  bool ack_host_change = 4;
}

message TuneHostResponse {
  string profile = 1;
  string sysctl_config_path = 2;
  string config_text = 3;
  bool wrote_config = 4;
  bool applied_live = 5;
  repeated TuneHostResult results = 6;
}

message TuneHostResult {
  string key = 1;
  string value = 2;
  string state = 3;
  string detail = 4;
}

message PlanPacketCaptureRequest {
  // Interface to capture on. Use "any" only when a specific ingress/egress
  // interface is unknown.
  string interface = 1;
  Protocol protocol = 2;
  string src_ip = 3;
  uint32 src_port = 4;
  string dest_ip = 5;
  uint32 dest_port = 6;
  // Bounded capture duration. Server clamps to the supported range.
  uint32 duration_seconds = 7;
  // Maximum packet count. Server clamps to the supported range.
  uint32 packet_count = 8;
  // Snap length in bytes. Server clamps to the supported range.
  uint32 snaplen_bytes = 9;
  // Human label used only for the output filename.
  string label = 10;
  // Optional telemetry flow identifier preserved with the capture metadata so
  // Explain can correlate completed artifacts with EVE flow/alert evidence.
  string flow_id = 11;
}

message StartPacketCaptureRequest {
  // Interface to capture on. Use "any" only when a specific ingress/egress
  // interface is unknown.
  string interface = 1;
  Protocol protocol = 2;
  string src_ip = 3;
  uint32 src_port = 4;
  string dest_ip = 5;
  uint32 dest_port = 6;
  // Bounded capture duration. Server clamps to the supported range.
  uint32 duration_seconds = 7;
  // Maximum packet count. Server clamps to the supported range.
  uint32 packet_count = 8;
  // Snap length in bytes. Server clamps to the supported range.
  uint32 snaplen_bytes = 9;
  // Human label used only for the output filename.
  string label = 10;
  // Required by StartPacketCapture.
  bool ack_capture = 11;
  // Optional telemetry flow identifier preserved with the capture metadata so
  // Explain can correlate completed artifacts with EVE flow/alert evidence.
  string flow_id = 12;
}

message ListPacketCapturesRequest {
  // Maximum artifacts to return. Zero uses the server default.
  uint32 limit = 1;
  // Optional telemetry flow identifier for returning only capture artifacts
  // that were started or planned for that observed flow.
  string flow_id = 2;
}

message ListPacketCapturesResponse {
  repeated PacketCaptureJob captures = 1;
  // Server capture directory used for artifact discovery.
  string capture_dir = 2;
}

message DownloadPacketCaptureRequest {
  // Safe capture artifact id, without path separators or extension.
  string id = 1;
}

enum PacketCaptureRetentionState {
  PACKET_CAPTURE_RETENTION_STATE_UNSPECIFIED = 0;
  PACKET_CAPTURE_RETENTION_STATE_RETAINED = 1;
  PACKET_CAPTURE_RETENTION_STATE_RELEASED = 2;
}

message PacketCaptureRetention {
  PacketCaptureRetentionState state = 1;
  // Server-normalized UTC RFC3339Nano timestamp required for retained
  // artifacts and cleared for released artifacts.
  string retain_until = 2;
  // Bounded operator reason for the metadata update.
  string retention_reason = 3;
  // Optional incident/case label. It is not treated as a custody record.
  string case_id = 4;
  // Server timestamp for the last metadata update.
  string updated_at = 5;
  // Server actor name for the last metadata update.
  string updated_by = 6;
}

message SetPacketCaptureRetentionRequest {
  // Safe capture artifact id, without path separators or extension.
  string id = 1;
  PacketCaptureRetentionState state = 2;
  // Required future UTC RFC3339 timestamp when state is RETAINED.
  string retain_until = 3;
  // Required bounded operator reason for the metadata update.
  string retention_reason = 4;
  // Optional incident/case label.
  string case_id = 5;
  // Required acknowledgement because this changes evidence metadata.
  bool ack_retention_change = 6;
}

message SetPacketCaptureRetentionResponse {
  PacketCaptureJob job = 1;
}

message PlanPacketCaptureResponse {
  PacketCapturePlan plan = 1;
}

message PacketCapturePlan {
  string interface = 1;
  Protocol protocol = 2;
  string src_ip = 3;
  uint32 src_port = 4;
  string dest_ip = 5;
  uint32 dest_port = 6;
  uint32 duration_seconds = 7;
  uint32 packet_count = 8;
  uint32 snaplen_bytes = 9;
  string output_path = 10;
  string bpf_filter = 11;
  // Human-copyable command for local break-glass use.
  string command = 12;
  // Exact tcpdump argv executed by StartPacketCapture. The server applies the
  // duration bound without going through a shell.
  repeated string command_argv = 13;
  repeated string warnings = 14;
  // Optional telemetry flow identifier supplied by the operator.
  string flow_id = 15;
}

message StartPacketCaptureResponse {
  PacketCaptureJob job = 1;
}

message PacketCaptureJob {
  string id = 1;
  string state = 2;
  string detail = 3;
  PacketCapturePlan plan = 4;
  string started_at = 5;
  string completed_at = 6;
  int32 exit_code = 7;
  string stderr = 8;
  uint64 bytes_written = 9;
  // SHA-256 of the completed pcap file when the server can read it.
  string sha256 = 10;
  // Safe id used by DownloadPacketCapture. It is derived from the pcap
  // filename and never contains path separators.
  string artifact_id = 11;
  // Relative REST path for downloading this capture artifact.
  string download_path = 12;
  // Safe pcap filename exposed to clients.
  string filename = 13;
  // Content type used by DownloadPacketCapture.
  string media_type = 14;
  // Non-destructive retention metadata stored in the sidecar only.
  PacketCaptureRetention retention = 15;
}

