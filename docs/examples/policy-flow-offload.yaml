# Flowtable forwarding fast path. This accelerates established L3/L4
# flows with nftables flowtables. It is intentionally incompatible with
# IDS/IPS because offloaded packets can bypass inspection.
zones:
  - name: wan
    interfaces: [eth0]
  - name: lan
    interfaces: [eth1]
addresses:
  - name: lan-net
    cidr: 10.10.0.0/24
rules:
  - name: lan-to-wan
    from_zones: [lan]
    to_zones: [wan]
    source_addresses: [lan-net]
    action: ACTION_ALLOW
network:
  enable_flow_offload: true
