# Inline IPS fail-closed example: Suricata inspects forwarded traffic via
# NFQUEUE, and queue failure blocks/holds traffic instead of bypassing.
zones:
  - name: wan
    interfaces: [eth0]
  - name: lan
    interfaces: [eth1]
addresses:
  - name: lan-net
    cidr: 10.10.0.0/24
rules:
  - name: lan-to-wan
    from_zones: [lan]
    to_zones: [wan]
    source_addresses: [lan-net]
    action: ACTION_ALLOW
ids:
  enabled: true
  mode: IDS_MODE_PREVENT
  queue_num: 0
  failure_behavior: IDS_FAILURE_BEHAVIOR_FAIL_CLOSED
