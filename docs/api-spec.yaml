        items:
          type: string
        description: Interfaces to sniff in detect mode. Empty = every zone interface.
      homeNetworks:
        type: array
        items:
          type: string
        description: HOME_NET CIDRs. Empty = RFC1918 private ranges.
      ruleFiles:
        type: array
        items:
          type: string
        description: |-
          Rule files loaded from the managed rules directory.
          Empty = ["local.rules"]. Populate via suricata-update or drop-in.
      queueNum:
        type: integer
        format: int64
        description: NFQUEUE number for prevent mode (default 0).
      failureBehavior:
        $ref: '#/definitions/openngfw.v1.IdsFailureBehavior'
        description: Required when mode == IDS_MODE_PREVENT.
      exceptions:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.IdsException'
        description: |-
          OpenNGFW-owned false-positive controls. These compile to native
          engine suppressions, but the policy model remains stable if the
          matching engine changes.
  openngfw.v1.IdsException:
    type: object
    properties:
      name:
        type: string
      disabled:
        type: boolean
      signatureId:
        type: string
        format: int64
      threatId:
        type: string
      sourceAddress:
        type: string
        description: Optional Address object restricting suppression to source scope.
      destinationAddress:
        type: string
        description: Optional Address object restricting suppression to destination scope.
      description:
        type: string
      owner:
        type: string
        description: Optional operator metadata for review ownership and CAB traceability.
      ticketId:
        type: string
      reviewDate:
        type: string
        description: ISO-8601 calendar date (YYYY-MM-DD) when this exception should be reviewed.
      expiresAt:
        type: string
        description: ISO-8601 calendar date (YYYY-MM-DD) after which this exception is stale.
      pcapSha256:
        type: string
        description: SHA-256 of the representative packet capture used to justify the exception.
      regressionRef:
        type: string
        description: Package-local regression evidence reference, e.g. evidence/fp-regression.json.
    description: |-
      IdsException suppresses one noisy threat signature globally or for a
      source/destination address object. signature_id is the current v1
      engine key; threat_id preserves OpenNGFW Threat-ID metadata for audit,
      UI, and future content-package mapping.
  openngfw.v1.IdsFailureBehavior:
    type: string
    enum:
      - IDS_FAILURE_BEHAVIOR_UNSPECIFIED
      - IDS_FAILURE_BEHAVIOR_FAIL_OPEN
      - IDS_FAILURE_BEHAVIOR_FAIL_CLOSED
    default: IDS_FAILURE_BEHAVIOR_UNSPECIFIED
    description: |2-
       - IDS_FAILURE_BEHAVIOR_FAIL_OPEN: If Suricata/NFQUEUE is unavailable, bypass inspection and continue
      policy evaluation. This preserves availability but is a visible bypass.
       - IDS_FAILURE_BEHAVIOR_FAIL_CLOSED: If Suricata/NFQUEUE is unavailable, hold/drop queued traffic. This
      preserves inspection guarantees at the cost of availability.
  openngfw.v1.IdsMode:
    type: string
    enum:
      - IDS_MODE_UNSPECIFIED
      - IDS_MODE_DETECT
      - IDS_MODE_PREVENT
    default: IDS_MODE_UNSPECIFIED
    description: |2-
       - IDS_MODE_DETECT: Passive detection: Suricata sniffs interfaces via AF_PACKET.
       - IDS_MODE_PREVENT: Inline prevention: forwarded traffic is queued to Suricata via
      NFQUEUE. failure_behavior defines whether queue failure bypasses or
      blocks traffic.
