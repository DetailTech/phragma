      rewrittenReferences:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.PolicyObjectReference'
        description: |-
          References that pointed to old_name before the mutation and were rewritten
          to new_name in the candidate policy.
      candidateStatus:
        $ref: '#/definitions/openngfw.v1.GetCandidateStatusResponse'
        description: Candidate workspace state after the mutation.
  openngfw.v1.RenderArtifact:
    type: object
    properties:
      engine:
        type: string
