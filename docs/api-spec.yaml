      packageState:
        type: string
      packageVersion:
        type: string
      manifestSha256:
        type: string
      evidence:
        $ref: '#/definitions/openngfw.v1.ContentEvidenceRef'
      contentJson:
        type: string
        description: |-
          JSON evidence payload. The server only returns bounded, valid JSON from
