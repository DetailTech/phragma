      - TLS_INSPECTION_MODE_DECRYPTION_REQUIRED
      - TLS_INSPECTION_MODE_BYPASS
    default: TLS_INSPECTION_MODE_UNSPECIFIED
    description: |2-
       - TLS_INSPECTION_MODE_METADATA_ONLY: Metadata-only TLS handling uses observable handshake/certificate/SNI
