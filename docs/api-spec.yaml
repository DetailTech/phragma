      - EXPLAIN_DECISION_TERM_BLOCKED
      - EXPLAIN_DECISION_TERM_BYPASSED
      - EXPLAIN_DECISION_TERM_PARTIALLY_INSPECTED
      - EXPLAIN_DECISION_TERM_FULLY_INSPECTED
      - EXPLAIN_DECISION_TERM_DECRYPTED
