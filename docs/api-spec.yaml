  /v1/auth/oidc/status:
    get:
      summary: Read browser OIDC status
      operationId: getOIDCStatus
      tags:
        - auth
      description: Reports browser SSO provider posture and, when a valid WebUI session cookie is present, the current actor, role, and CSRF token used by browser mutations.
      security: []
      responses:
        "200":
          description: OIDC status
          schema:
            $ref: '#/definitions/openngfw.v1.OIDCStatusResponse'
  /v1/auth/oidc/login:
    get:
      summary: Start browser OIDC login
      operationId: oidcLogin
      tags:
        - auth
      description: Redirects the browser to the configured OIDC provider. This route is public on the management listener and does not accept bearer-token API authentication.
      security: []
      parameters:
        - name: return
          in: query
          required: false
          type: string
          description: Optional WebUI return path after successful login.
      responses:
        "302":
          description: Redirect
        "401":
          description: OIDC login failed
  /v1/auth/oidc/callback:
    get:
      summary: Complete browser OIDC login
      operationId: oidcCallback
      tags:
        - auth
      description: Consumes the provider authorization-code callback, validates state, PKCE, and nonce, then establishes an HttpOnly WebUI session cookie.
      security: []
      parameters:
        - name: code
          in: query
          required: true
          type: string
          description: OIDC authorization code.
        - name: state
          in: query
          required: true
          type: string
          description: Opaque login state generated by the firewall.
      responses:
        "302":
          description: Redirect
        "401":
          description: OIDC login failed
  /v1/auth/saml/status:
    get:
      summary: Read browser SAML status
      operationId: getSAMLStatus
      tags:
        - auth
      description: Reports browser SAML provider posture and, when a valid WebUI session cookie is present, the current actor, role, and CSRF token used by browser mutations.
      security: []
      responses:
        "200":
          description: SAML status
          schema:
            $ref: '#/definitions/openngfw.v1.SAMLStatusResponse'
  /v1/auth/saml/login:
    get:
      summary: Start browser SAML login
      operationId: samlLogin
      tags:
        - auth
      description: Redirects the browser to the configured SAML identity provider. This route is public on the management listener and does not accept bearer-token API authentication.
      security: []
      parameters:
        - name: return
          in: query
          required: false
          type: string
          description: Optional WebUI return path after successful login.
      responses:
        "302":
          description: Redirect
        "401":
          description: SAML login failed
  /v1/auth/saml/acs:
    post:
      summary: Complete browser SAML login
      operationId: samlACS
      tags:
        - auth
      description: Consumes the IdP SAMLResponse and RelayState, validates the assertion, then establishes an HttpOnly WebUI session cookie.
      security: []
      parameters:
        - name: SAMLResponse
          in: formData
          required: true
          type: string
          description: Base64-encoded SAML response posted by the IdP.
        - name: RelayState
          in: formData
          required: true
          type: string
          description: Opaque login state generated by the firewall.
      responses:
        "302":
          description: Redirect
        "401":
          description: SAML login failed
  /v1/auth/logout:
    post:
      summary: End browser SSO session
      operationId: browserLogout
      tags:
        - auth
      description: Clears the active WebUI session cookie. When a session cookie is present, unsafe-method CSRF protection requires the X-Phragma-CSRF header returned by the status endpoint.
      security: []
      parameters:
        - name: X-Phragma-CSRF
          in: header
          required: false
          type: string
          description: CSRF token returned by the OIDC or SAML status endpoint for browser-cookie mutations.
      responses:
        "204":
          description: Session ended
        "403":
          description: Missing or invalid CSRF token
