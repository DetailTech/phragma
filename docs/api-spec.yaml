  /v1/threat-exceptions:
    get:
      summary: |-
        ListThreatExceptions returns first-party false-positive exceptions from
        the selected policy source. The default is the effective candidate when
        present, otherwise the running policy.
      operationId: ThreatTuningService_ListThreatExceptions
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.ListThreatExceptionsResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: source
          description: |-
            POLICY_SOURCE_UNSPECIFIED means effective policy: candidate when staged,
            otherwise running. POLICY_SOURCE_VERSION also requires version.
          in: query
          required: false
          type: string
          enum:
            - POLICY_SOURCE_UNSPECIFIED
            - POLICY_SOURCE_RUNNING
            - POLICY_SOURCE_CANDIDATE
            - POLICY_SOURCE_VERSION
          default: POLICY_SOURCE_UNSPECIFIED
        - name: version
          in: query
          required: false
          type: string
          format: uint64
      tags:
        - ThreatTuningService
