        format: int64
      recorded:
        type: integer
        format: int64
      missing:
        type: integer
        format: int64
      invalid:
        type: integer
        format: int64
      notApplicable:
        type: integer
        format: int64
      todo:
        type: integer
        format: int64
  openngfw.v1.RemoveThreatExceptionResponse:
    type: object
    properties:
      previousException:
        $ref: '#/definitions/openngfw.v1.IdsException'
      candidateStatus:
        $ref: '#/definitions/openngfw.v1.GetCandidateStatusResponse'
      validation:
        $ref: '#/definitions/openngfw.v1.ValidateResponse'
      diff:
        $ref: '#/definitions/openngfw.v1.DiffPolicyResponse'
  openngfw.v1.RenamePolicyObjectRequest:
