  openngfw.v1.Network:
    type: object
    properties:
      mtu:
        type: integer
        format: int64
        description: |-
          MTU applied to every zone interface (e.g. 9000 for jumbo frames).
          0 leaves interface MTUs unmanaged. The IDS capture size
          (default-packet-size) is derived from the largest configured MTU
          automatically.
      interfaceMtus:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.InterfaceMtu'
        description: |-
          Per-interface MTU overrides; may also name interfaces outside any
          zone (e.g. a management interface).
      clampMssToPmtu:
        type: boolean
        description: |-
          Clamp forwarded TCP SYN MSS to the path MTU. Strongly recommended
          with jumbo frames or VPN tunnels, where path MTUs differ per hop.
      manageNicOffloads:
        type: boolean
        description: |-
          Disable NIC offloads (GRO/LRO/TSO/GSO) on IDS-monitored interfaces
          so the inspection engine sees real wire frames instead of
          reassembled super-packets. Applies only in IDS detect mode; has a
          forwarding-throughput cost on those interfaces.
      enableFlowOffload:
        type: boolean
        description: |-
          Enable nftables flowtable fast path for established forwarded flows.
          This is a throughput optimization for L3/L4 forwarding-only paths.
          It is rejected when IDS/IPS is enabled because offloaded packets can
          bypass packet inspection.
