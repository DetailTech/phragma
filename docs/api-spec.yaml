        $ref: '#/definitions/openngfw.v1.AccessAdministrationSession'
      detail:
        type: string
  openngfw.v1.RollbackContentPackageResponse:
    type: object
    properties:
      package:
        $ref: '#/definitions/openngfw.v1.ContentPackageInfo'
      rollbackCreated:
        type: boolean
      rollbackPath:
        type: string
        description: |-
          Backup created from the package that was active immediately before
          rollback, when available.
      detail:
        type: string
      restoredRollbackPath:
        type: string
        description: Verified rollback backup selected and restored by this operation.
  openngfw.v1.RollbackRequest:
    type: object
    properties:
      version:
        type: string
        format: uint64
        description: Version to restore.
      comment:
        type: string
        description: |-
          Required audit comment explaining why this historical policy is being
          re-applied.
