  /v1/system/packet-captures:
    get:
      summary: |-
        ListPacketCaptures returns recent completed pcap artifacts from the
        configured capture directory. It returns metadata and safe download links;
        pcap bytes are only returned by DownloadPacketCapture.
      operationId: SystemService_ListPacketCaptures
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.ListPacketCapturesResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: limit
          description: Maximum artifacts to return. Zero uses the server default.
          in: query
          required: false
          type: integer
          format: int64
        - name: flowId
          description: |-
            Optional telemetry flow identifier for returning only capture artifacts
            that were started or planned for that observed flow.
          in: query
          required: false
          type: string
      tags:
        - SystemService
    post:
      summary: |-
        StartPacketCapture runs one bounded packet capture on the firewall host.
        It is a privileged diagnostic action: callers must acknowledge it, RBAC
        requires admin, and every attempt is written to the audit log.
      operationId: SystemService_StartPacketCapture
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.StartPacketCaptureResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.StartPacketCaptureRequest'
      tags:
        - SystemService
  /v1/system/packet-captures/{id}/download:
    get:
      summary: |-
