        $ref: '#/definitions/openngfw.v1.ExplainRuntimeEvidence'
      natProfile:
        $ref: '#/definitions/openngfw.v1.ExplainNatProfile'
      decisionTerms:
        type: array
        items:
          $ref: '#/definitions/openngfw.v1.ExplainDecisionTerm'
        description: |-
          First-class decision vocabulary required by the product hard
          requirements. Terms are additive: for example an allowed flow can also be
          partially inspected and fail-open by policy.
      decisionSummary:
        type: string
        description: |-
          Human-readable summary derived from decision_terms without replacing the
          detailed reason/evidence fields.
      matchedRuleContext:
        $ref: '#/definitions/openngfw.v1.RuleMatchContext'
        description: |-
          The identity/posture context attached to the first matching rule, when
          present. This mirrors policy context and does not prove live IdP or MDM
          state.
      matchedRuleId:
        type: string
        description: |-
          Durable forwarding-rule identity for API/UI targeting, audit correlation,
          compiler IR, renderer metadata, and SIEM/counter joins. Names remain
          operator-facing labels and may change.
  openngfw.v1.ExplainInspectionProfile:
    type: object
    properties:
      idsEnabled:
        type: boolean
      idsMode:
        $ref: '#/definitions/openngfw.v1.IdsMode'
      failureBehavior:
        $ref: '#/definitions/openngfw.v1.IdsFailureBehavior'
      engine:
        type: string
        description: |-
          The inspection/matching engine used for the current IDS/IPS mode. This is
          evidence, not the OpenNGFW product model.
      flowOffloadEnabled:
        type: boolean
      bypassPossible:
        type: boolean
        description: |-
          True when policy or runtime degradation can intentionally bypass userspace
          inspection. The reason field explains the exact policy-controlled bypass.
      bypassReason:
        type: string
      inspectionOrder:
        type: string
        description: Human-readable ordering between policy enforcement and inspection handoff.
      degradedBehavior:
        type: string
        description: Human-readable behavior if the userspace inspection engine is unavailable.
      evidence:
        type: array
        items:
          type: string
  openngfw.v1.ExplainInspectionState:
    type: string
    enum:
      - EXPLAIN_INSPECTION_STATE_UNSPECIFIED
      - EXPLAIN_INSPECTION_STATE_NOT_INSPECTED
      - EXPLAIN_INSPECTION_STATE_IDS_DETECT
      - EXPLAIN_INSPECTION_STATE_IPS_PREVENT
      - EXPLAIN_INSPECTION_STATE_BLOCKED_BEFORE_INSPECTION
    default: EXPLAIN_INSPECTION_STATE_UNSPECIFIED
  openngfw.v1.ExplainNatProfile:
    type: object
    properties:
      destination:
        $ref: '#/definitions/openngfw.v1.ExplainDestinationNatProfile'
      source:
        $ref: '#/definitions/openngfw.v1.ExplainSourceNatProfile'
      evidence:
        type: array
        items:
          type: string
  openngfw.v1.ExplainRouteProfile:
    type: object
    properties:
      evaluated:
        type: boolean
        description: |-
          True when the policy verdict allows forwarding and a route lookup is
          meaningful. Blocked flows do not evaluate routing.
      matched:
        type: boolean
      destination:
        type: string
        description: Destination prefix selected by longest-prefix match.
      nextHop:
        type: string
      egressInterface:
        type: string
      metric:
        type: integer
        format: int64
      source:
        type: string
        description: Current values include "static", "kernel-unresolved", and "not-evaluated".
      reason:
        type: string
      evidence:
        type: array
        items:
          type: string
  openngfw.v1.ExplainRuntimeEvidence:
    type: object
    properties:
      queried:
        type: boolean
        description: |-
          True when the server attempted to inspect live dataplane state for this
          tuple. Runtime evidence never changes the policy-model verdict.
      state:
        type: string
        description: ready, degraded, or unavailable. Empty means runtime evidence was skipped.
      detail:
        type: string
      runningPolicyVersion:
        type: string
        format: uint64
        description: |-
          Running policy version at runtime-evidence query time. This can differ
          from policy_version when explaining a candidate or historical version.
      policyContext:
        type: string
      sessions:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.ConntrackSession'
        description: Matching Linux conntrack sessions from the active dataplane.
      evidence:
        type: array
        items:
          type: string
      warnings:
        type: array
        items:
          type: string
      correlatedFlows:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.Flow'
        description: Matching EVE flow records for request.flow_id, when supplied.
      correlatedAlerts:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.Alert'
        description: Matching EVE alert records for request.flow_id, when supplied.
      correlatedCaptures:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.PacketCaptureJob'
        description: Matching packet capture artifacts for request.flow_id, when supplied.
  openngfw.v1.ExplainSourceNatProfile:
    type: object
    properties:
      evaluated:
        type: boolean
        description: True when source NAT was evaluated after an allow verdict.
      matched:
        type: boolean
      matchedRule:
        type: string
      matchedRuleIndex:
        type: integer
        format: int64
        description: |-
          Zero-based index in policy.nat.source. Meaningful only when matched_rule
          is set.
      originalSourceIp:
        type: string
      translatedSourceIp:
        type: string
        description: |-
          Empty for masquerade because the runtime egress address is selected by
          the dataplane, not the pure policy model.
      masquerade:
        type: boolean
      reason:
        type: string
      evidence:
        type: array
        items:
          type: string
      matchedRuleId:
        type: string
        description: Durable source-NAT rule identity when a rule matched.
  openngfw.v1.ExplainVerdict:
    type: string
    enum:
      - EXPLAIN_VERDICT_UNSPECIFIED
      - EXPLAIN_VERDICT_ALLOWED
      - EXPLAIN_VERDICT_DENIED
      - EXPLAIN_VERDICT_REJECTED
      - EXPLAIN_VERDICT_DEFAULT_DROP
    default: EXPLAIN_VERDICT_UNSPECIFIED
  openngfw.v1.FeedEnable:
    type: object
    properties:
      name:
        type: string
      enabled:
        type: boolean
  openngfw.v1.FeedInfo:
    type: object
    properties:
      name:
        type: string
      description:
        type: string
      url:
        type: string
      license:
        type: string
        description: License identifier/summary, e.g. "CC0", "non-commercial only".
      allowsCommercialUse:
        type: boolean
      allowsRedistribution:
        type: boolean
      attribution:
        type: string
        description: Attribution text that must accompany use, if any.
      enabled:
        type: boolean
      custom:
        type: boolean
        description: True for operator-defined custom feeds.
  openngfw.v1.FileSecurityMode:
    type: string
    enum:
      - FILE_SECURITY_MODE_UNSPECIFIED
      - FILE_SECURITY_MODE_LOG_ONLY
      - FILE_SECURITY_MODE_BLOCK_EXECUTABLES
      - FILE_SECURITY_MODE_BLOCK_HIGH_RISK
    default: FILE_SECURITY_MODE_UNSPECIFIED
  openngfw.v1.Flow:
    type: object
    properties:
      time:
        type: string
        format: date-time
      srcIp:
        type: string
      srcPort:
        type: integer
        format: int64
      destIp:
        type: string
      destPort:
        type: integer
        format: int64
      protocol:
        type: string
      appProtocol:
        type: string
        description: |-
          Engine-native application-layer protocol signal, for example Suricata's
          app_proto. This is evidence, not the canonical App-ID product label.
      bytesToServer:
        type: string
        format: uint64
      bytesToClient:
        type: string
        format: uint64
      packets:
        type: string
        format: uint64
      appId:
        type: string
        description: Canonical OpenNGFW App-ID label such as web-browsing, ssl, dns, or ssh.
      appName:
        type: string
        description: Human-readable App-ID name.
      appCategory:
        type: string
        description: OpenNGFW application category such as network-service or remote-access.
      appConfidence:
        type: integer
        format: int64
        description: Confidence score 0-100 derived from evidence quality.
      appEvidence:
        type: array
        items:
          type: string
        description: Evidence behind app_id, including engine signals and fallback heuristics.
      policyVersion:
        type: string
        format: uint64
        description: |-
          Exact policy version stamped on the event by the telemetry pipeline. Zero
          means the event source did not include policy provenance.
      policyVersionKnown:
        type: boolean
      flowId:
        type: string
        description: Stable engine/telemetry flow identifier when the event source provides one.
  openngfw.v1.FlowtableStatus:
    type: object
    properties:
      hostState:
        type: string
      hostDetail:
        type: string
      runtimeState:
        type: string
      runtimeDetail:
        type: string
      devices:
        type: array
        items:
          type: string
      packets:
        type: string
        format: uint64
      bytes:
        type: string
        format: uint64
      flowtableDeclared:
        type: boolean
      offloadRulePresent:
        type: boolean
  openngfw.v1.FrrRuntimeStatus:
    type: object
    properties:
      state:
        type: string
      detail:
        type: string
      bgpNeighbors:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.BgpNeighborRuntimeStatus'
      ospfNeighbors:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.OspfNeighborRuntimeStatus'
  openngfw.v1.GetAccessAdministrationResponse:
    type: object
    properties:
      authEnabled:
        type: boolean
      localUsers:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.AccessAdministrationLocalUser'
      oidc:
        $ref: '#/definitions/openngfw.v1.AccessAdministrationOidc'
      sessions:
        $ref: '#/definitions/openngfw.v1.AccessAdministrationSessions'
      breakGlass:
        $ref: '#/definitions/openngfw.v1.AccessAdministrationBreakGlass'
      blockers:
        type: array
        items:
          type: string
      saml:
        $ref: '#/definitions/openngfw.v1.AccessAdministrationSaml'
  openngfw.v1.GetBackupSnapshotResponse:
    type: object
    properties:
      snapshot:
        $ref: '#/definitions/openngfw.v1.BackupSnapshot'
      policy:
        $ref: '#/definitions/openngfw.v1.Policy'
  openngfw.v1.GetCandidateStatusResponse:
    type: object
    properties:
      hasCandidate:
        type: boolean
        description: |-
          True when a candidate blob exists in the store, even if it currently
          matches running policy.
      dirty:
        type: boolean
        description: True when candidate differs from the running policy.
      runningVersion:
        type: string
        format: uint64
        description: Current running policy version used as the comparison baseline.
      changeCount:
        type: integer
        format: int64
        description: Total added + modified + removed items across section summaries.
      changes:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.CandidateChangeSummary'
        description: Section-level summaries suitable for candidate bars and automation.
      impact:
        $ref: '#/definitions/openngfw.v1.ChangeImpact'
        description: First-party impact summary comparing candidate to running policy.
      candidateRevision:
        type: string
        description: |-
          Optimistic-concurrency token for candidate writes. When no candidate blob
          exists, this is scoped to the running policy version so stale empty-state
          clients cannot overwrite a newer running baseline.
  openngfw.v1.GetComplianceReportResponse:
    type: object
    properties:
      schemaVersion:
        type: string
        description: Response schema version.
      report:
        $ref: '#/definitions/openngfw.v1.ComplianceReportSummary'
