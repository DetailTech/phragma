swagger: "2.0"
info:
  title: Phragma Control Plane API
  description: |
    Versioned local control-plane API for the Phragma single-node NGFW appliance.
    Proto definitions and grpc-gateway annotations are the generated
    REST/OpenAPI input for versioned appliance resources. Release acceptance
    treats proto inputs, generator config, normalized OpenAPI output,
    published docs spec, and bundled WebUI spec as one atomic API contract.
    The published contract also includes maintained management-plane auth
    routes registered outside protobuf by the embedded control daemon.
  version: v1
tags:
  - name: AlertService
  - name: PolicyService
  - name: AppIdService
  - name: ComplianceService
  - name: FlowService
  - name: SystemService
  - name: ExplainService
  - name: IntelService
  - name: ThreatTuningService
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /v1/alerts:
    get:
      summary: ListAlerts returns recent IDS/IPS alerts, newest first.
      operationId: AlertService_ListAlerts
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.ListAlertsResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: limit
          description: Maximum alerts to return; 0 means server default (100).
          in: query
          required: false
          type: integer
          format: int64
        - name: srcIp
          description: Exact source IP filter.
          in: query
          required: false
          type: string
        - name: destIp
          description: Exact destination IP filter.
          in: query
          required: false
          type: string
        - name: ip
          description: Exact IP filter matching either endpoint.
          in: query
          required: false
          type: string
        - name: protocol
          description: Exact L4 protocol filter, case-insensitive, e.g. TCP, UDP, ICMP.
          in: query
          required: false
          type: string
        - name: action
          description: Suricata action filter, e.g. allowed or blocked.
          in: query
          required: false
          type: string
        - name: severity
          description: Engine severity filter, where 1 is highest.
          in: query
          required: false
          type: integer
          format: int64
        - name: threatSeverity
          description: 'OpenNGFW severity filter: critical, high, medium, low, or info.'
          in: query
          required: false
          type: string
        - name: signatureId
          description: Suricata signature ID filter.
          in: query
          required: false
          type: string
          format: int64
        - name: port
          description: Port filter matching either source or destination port.
          in: query
          required: false
          type: integer
          format: int64
        - name: since
          description: Include alerts at or after this timestamp.
          in: query
          required: false
          type: string
          format: date-time
        - name: until
          description: Include alerts at or before this timestamp.
          in: query
          required: false
          type: string
          format: date-time
        - name: query
          description: |-
            Case-insensitive text search across endpoints, protocol, signature,
            categories, Threat-ID fields, and evidence.
          in: query
          required: false
          type: string
        - name: flowId
          description: |-
            Exact engine/telemetry flow identifier for correlating IDS/IPS detections
            with flow telemetry and troubleshooting handoffs.
          in: query
          required: false
          type: string
        - name: pageCursor
          description: Opaque cursor from a previous response for high-volume browsing.
          in: query
          required: false
          type: string
      tags:
        - AlertService
  /v1/policy:
    get:
      summary: GetPolicy returns the running, candidate, or a historical policy.
      operationId: PolicyService_GetPolicy
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.GetPolicyResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: source
          in: query
          required: false
          type: string
          enum:
            - POLICY_SOURCE_UNSPECIFIED
            - POLICY_SOURCE_RUNNING
            - POLICY_SOURCE_CANDIDATE
            - POLICY_SOURCE_VERSION
          default: POLICY_SOURCE_UNSPECIFIED
        - name: version
          description: Version id; required when source == POLICY_SOURCE_VERSION.
          in: query
          required: false
          type: string
          format: uint64
      tags:
        - PolicyService
  /v1/candidate:
    put:
      summary: SetCandidate replaces the candidate policy. Nothing is applied.
      operationId: PolicyService_SetCandidate
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.SetCandidateResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.SetCandidateRequest'
      tags:
        - PolicyService
  /v1/candidate/validate:
    post:
      summary: |-
        Validate checks the candidate (schema, references, renderability)
        without touching any engine. If request.policy is supplied, that
        unstaged policy is validated instead; the stored candidate is unchanged.
      operationId: PolicyService_Validate
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.ValidateResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.ValidateRequest'
      tags:
        - PolicyService
  /v1/candidate/status:
    get:
      summary: |-
        GetCandidateStatus returns dirty-state, section-level change counts, and
        first-party impact metadata for the staged candidate. This is the read-only
        status source for GUI, CLI, and automation review surfaces.
      operationId: PolicyService_GetCandidateStatus
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.GetCandidateStatusResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      tags:
        - PolicyService
  /v1/policy/nat:
    get:
      summary: |-
        ListNatRules returns source and destination NAT rules from the selected
        policy snapshot. This is read-only and never mutates candidate state.
      operationId: PolicyService_ListNatRules
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.ListNatRulesResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: source
          description: Target policy snapshot. Defaults to running when unspecified.
          in: query
          required: false
          type: string
          enum:
            - POLICY_SOURCE_UNSPECIFIED
            - POLICY_SOURCE_RUNNING
            - POLICY_SOURCE_CANDIDATE
            - POLICY_SOURCE_VERSION
          default: POLICY_SOURCE_UNSPECIFIED
        - name: version
          description: Version id; required when source == POLICY_SOURCE_VERSION.
          in: query
          required: false
          type: string
          format: uint64
      tags:
        - PolicyService
  /v1/candidate/nat/source/{rule.name}:
    put:
      summary: |-
        UpsertCandidateSourceNat adds or replaces one named source NAT rule in the
        candidate. Running policy is unchanged until the normal commit path.
      operationId: PolicyService_UpsertCandidateSourceNat
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.UpsertCandidateSourceNatResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: rule.name
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.PolicyService.UpsertCandidateSourceNatBody'
      tags:
        - PolicyService
  /v1/candidate/nat/source/by-id/{id}:
    delete:
      summary: |-
        DeleteCandidateSourceNat removes one named source NAT rule from the
        candidate. Running policy is unchanged until the normal commit path.
      operationId: PolicyService_DeleteCandidateSourceNat2
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.DeleteCandidateSourceNatResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: id
          description: |-
            Optional durable rule ID resolver. When supplied, deletion is strictly by
            ID and never falls back to name matching.
          in: path
          required: true
          type: string
        - name: name
          in: query
          required: false
          type: string
        - name: expectedCandidateRevision
          description: Required optimistic-concurrency guard from GetCandidateStatusResponse.
          in: query
          required: false
          type: string
        - name: comment
          description: Operator audit comment. Either comment or reason must be supplied.
          in: query
          required: false
          type: string
        - name: reason
          description: Optional structured reason recorded alongside the audit comment.
          in: query
          required: false
          type: string
      tags:
        - PolicyService
    put:
      summary: |-
        UpsertCandidateSourceNat adds or replaces one named source NAT rule in the
        candidate. Running policy is unchanged until the normal commit path.
      operationId: PolicyService_UpsertCandidateSourceNat2
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.UpsertCandidateSourceNatResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: id
          description: |-
            Optional durable rule ID resolver. When supplied, the server updates the
            existing source NAT rule with this ID and preserves that ID even when the
            operator renames the rule. Missing, duplicate, or unknown IDs are rejected;
            the server never falls back to name matching for by-ID requests.
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.PolicyService.UpsertCandidateSourceNatBody'
      tags:
        - PolicyService
  /v1/candidate/nat/source/{name}:
    delete:
      summary: |-
        DeleteCandidateSourceNat removes one named source NAT rule from the
        candidate. Running policy is unchanged until the normal commit path.
      operationId: PolicyService_DeleteCandidateSourceNat
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.DeleteCandidateSourceNatResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: name
          in: path
          required: true
          type: string
        - name: expectedCandidateRevision
          description: Required optimistic-concurrency guard from GetCandidateStatusResponse.
          in: query
          required: false
          type: string
        - name: comment
          description: Operator audit comment. Either comment or reason must be supplied.
          in: query
          required: false
          type: string
        - name: reason
          description: Optional structured reason recorded alongside the audit comment.
          in: query
          required: false
          type: string
        - name: id
          description: |-
            Optional durable rule ID resolver. When supplied, deletion is strictly by
            ID and never falls back to name matching.
          in: query
          required: false
          type: string
      tags:
        - PolicyService
  /v1/candidate/nat/destination/{rule.name}:
    put:
      summary: |-
        UpsertCandidateDestinationNat adds or replaces one named destination NAT
        rule in the candidate. Running policy is unchanged until commit.
      operationId: PolicyService_UpsertCandidateDestinationNat
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.UpsertCandidateDestinationNatResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: rule.name
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.PolicyService.UpsertCandidateDestinationNatBody'
      tags:
        - PolicyService
  /v1/candidate/nat/destination/by-id/{id}:
    delete:
      summary: |-
        DeleteCandidateDestinationNat removes one named destination NAT rule from
        the candidate. Running policy is unchanged until commit.
      operationId: PolicyService_DeleteCandidateDestinationNat2
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.DeleteCandidateDestinationNatResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: id
          description: |-
            Optional durable rule ID resolver. When supplied, deletion is strictly by
            ID and never falls back to name matching.
          in: path
          required: true
          type: string
        - name: name
          in: query
          required: false
          type: string
        - name: expectedCandidateRevision
          description: Required optimistic-concurrency guard from GetCandidateStatusResponse.
          in: query
          required: false
          type: string
        - name: comment
          description: Operator audit comment. Either comment or reason must be supplied.
          in: query
          required: false
          type: string
        - name: reason
          description: Optional structured reason recorded alongside the audit comment.
          in: query
          required: false
          type: string
      tags:
        - PolicyService
    put:
      summary: |-
        UpsertCandidateDestinationNat adds or replaces one named destination NAT
        rule in the candidate. Running policy is unchanged until commit.
      operationId: PolicyService_UpsertCandidateDestinationNat2
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.UpsertCandidateDestinationNatResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: id
          description: |-
            Optional durable rule ID resolver. When supplied, the server updates the
            existing destination NAT rule with this ID and preserves that ID even when
            the operator renames the rule. Missing, duplicate, or unknown IDs are
            rejected; the server never falls back to name matching for by-ID requests.
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.PolicyService.UpsertCandidateDestinationNatBody'
      tags:
        - PolicyService
  /v1/candidate/nat/destination/{name}:
    delete:
      summary: |-
        DeleteCandidateDestinationNat removes one named destination NAT rule from
        the candidate. Running policy is unchanged until commit.
      operationId: PolicyService_DeleteCandidateDestinationNat
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.DeleteCandidateDestinationNatResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: name
          in: path
          required: true
          type: string
        - name: expectedCandidateRevision
          description: Required optimistic-concurrency guard from GetCandidateStatusResponse.
          in: query
          required: false
          type: string
        - name: comment
          description: Operator audit comment. Either comment or reason must be supplied.
          in: query
          required: false
          type: string
        - name: reason
          description: Optional structured reason recorded alongside the audit comment.
          in: query
          required: false
          type: string
        - name: id
          description: |-
            Optional durable rule ID resolver. When supplied, deletion is strictly by
            ID and never falls back to name matching.
          in: query
          required: false
          type: string
      tags:
        - PolicyService
  /v1/policy/object-references:
    get:
      summary: |-
        ListObjectReferences returns reverse references from the selected policy
        to named objects. This lets GUI, CLI, and automation prove the blast radius
        of changing or deleting an object through the public API.
      operationId: PolicyService_ListObjectReferences
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.ListObjectReferencesResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: source
          description: Policy snapshot to inspect. Defaults to running when unspecified.
          in: query
          required: false
          type: string
          enum:
            - POLICY_SOURCE_UNSPECIFIED
            - POLICY_SOURCE_RUNNING
            - POLICY_SOURCE_CANDIDATE
            - POLICY_SOURCE_VERSION
          default: POLICY_SOURCE_UNSPECIFIED
        - name: version
          description: Version id; required when source == POLICY_SOURCE_VERSION.
          in: query
          required: false
          type: string
          format: uint64
        - name: kind
          description: Required object collection to scan.
          in: query
          required: false
          type: string
          enum:
            - POLICY_OBJECT_KIND_UNSPECIFIED
            - POLICY_OBJECT_KIND_ZONE
            - POLICY_OBJECT_KIND_ADDRESS
            - POLICY_OBJECT_KIND_SERVICE
            - POLICY_OBJECT_KIND_APPLICATION
            - POLICY_OBJECT_KIND_SECURITY_PROFILE
            - POLICY_OBJECT_KIND_QOS_PROFILE
            - POLICY_OBJECT_KIND_ZONE_PROTECTION_PROFILE
          default: POLICY_OBJECT_KIND_UNSPECIFIED
        - name: name
          description: Optional object name. Empty returns references for every object of kind.
          in: query
          required: false
          type: string
      tags:
        - PolicyService
  /v1/candidate/object-rename:
    post:
      summary: |-
        RenamePolicyObject renames one reusable object in the candidate policy and
        rewrites every candidate reference to the new name. Running and historical
        policy snapshots are never mutated; operators must validate and commit the
        candidate through the normal lifecycle.
      operationId: PolicyService_RenamePolicyObject
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.RenamePolicyObjectResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.RenamePolicyObjectRequest'
      tags:
        - PolicyService
  /v1/policy/diff:
    get:
      summary: |-
        DiffPolicy returns a stable typed line diff between two policy snapshots.
        It is the public API source for GUI, CLI, and automation change review.
      operationId: PolicyService_DiffPolicy
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.DiffPolicyResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: fromSource
          description: Baseline policy snapshot. Defaults to running when unspecified.
          in: query
          required: false
          type: string
          enum:
            - POLICY_SOURCE_UNSPECIFIED
            - POLICY_SOURCE_RUNNING
            - POLICY_SOURCE_CANDIDATE
            - POLICY_SOURCE_VERSION
          default: POLICY_SOURCE_UNSPECIFIED
        - name: fromVersion
          description: Version id; required when from_source == POLICY_SOURCE_VERSION.
          in: query
          required: false
          type: string
          format: uint64
        - name: toSource
          description: Target policy snapshot. Defaults to candidate when unspecified.
          in: query
          required: false
          type: string
          enum:
            - POLICY_SOURCE_UNSPECIFIED
            - POLICY_SOURCE_RUNNING
            - POLICY_SOURCE_CANDIDATE
            - POLICY_SOURCE_VERSION
          default: POLICY_SOURCE_UNSPECIFIED
        - name: toVersion
          description: Version id; required when to_source == POLICY_SOURCE_VERSION.
          in: query
          required: false
          type: string
          format: uint64
      tags:
        - PolicyService
  /v1/change-approvals:
    get:
      summary: ListChangeApprovals returns recent approval records for operator review.
      operationId: PolicyService_ListChangeApprovals
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.ListChangeApprovalsResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: candidateRevision
          description: Optional candidate_revision filter.
          in: query
          required: false
          type: string
        - name: includeConsumed
          description: Include approvals already consumed by a commit intent.
          in: query
          required: false
          type: boolean
        - name: limit
          description: Maximum entries to return; 0 means server default (100).
          in: query
          required: false
          type: integer
          format: int64
      tags:
        - PolicyService
    post:
      summary: |-
        CreateChangeApproval records an admin approval for the exact candidate
        revision under review. Commit consumes one matching approval before live
        engine apply so direct API clients cannot bypass governance.
      operationId: PolicyService_CreateChangeApproval
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.CreateChangeApprovalResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.CreateChangeApprovalRequest'
      tags:
        - PolicyService
  /v1/backup/snapshots:
    get:
      summary: |-
        ListBackupSnapshots returns appliance-owned backup snapshot metadata,
        newest first.
      operationId: PolicyService_ListBackupSnapshots
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.ListBackupSnapshotsResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: limit
          description: Maximum entries to return; 0 means server default (100).
          in: query
          required: false
          type: integer
          format: int64
      tags:
        - PolicyService
    post:
      summary: |-
        CreateBackupSnapshot stores an appliance-owned policy snapshot in the
        server store. It is distinct from browser export; the snapshot remains
        available to server-side validation and restore preview APIs.
      operationId: PolicyService_CreateBackupSnapshot
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.CreateBackupSnapshotResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.CreateBackupSnapshotRequest'
      tags:
        - PolicyService
  /v1/backup/snapshots/{id}:
    get:
      summary: |-
        GetBackupSnapshot returns one appliance-owned backup snapshot and its
        policy payload for inspection/export.
      operationId: PolicyService_GetBackupSnapshot
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.GetBackupSnapshotResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: id
          in: path
          required: true
          type: string
      tags:
        - PolicyService
  /v1/backup/snapshots/{id}:validate:
    post:
      summary: |-
        ValidateBackupSnapshot validates a stored snapshot without mutating
        candidate or running policy.
      operationId: PolicyService_ValidateBackupSnapshot
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.ValidateBackupSnapshotResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: id
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.PolicyService.ValidateBackupSnapshotBody'
      tags:
        - PolicyService
  /v1/backup/snapshots/{id}:restore-preview:
    post:
      summary: |-
        PreviewBackupSnapshotRestore builds a restore-job preview. When
        stage_candidate is true, the snapshot is staged as candidate only; live
        engines and running policy are unchanged until the normal commit path.
      operationId: PolicyService_PreviewBackupSnapshotRestore
      responses:
        "200":
          description: A successful response.
          schema:
            $ref: '#/definitions/openngfw.v1.PreviewBackupSnapshotRestoreResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/google.rpc.Status'
      parameters:
        - name: id
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/openngfw.v1.PolicyService.PreviewBackupSnapshotRestoreBody'
      tags:
        - PolicyService
  /v1/commit:
    post:
      summary: |-
        Commit validates the candidate, applies it to the engines
