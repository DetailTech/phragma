      srcPort:
        type: integer
        format: int64
      destIp:
        type: string
      destPort:
        type: integer
        format: int64
      durationSeconds:
        type: integer
        format: int64
      packetCount:
        type: integer
        format: int64
      snaplenBytes:
        type: integer
        format: int64
      outputPath:
        type: string
      bpfFilter:
        type: string
      command:
        type: string
        description: Human-copyable command for local break-glass use.
      commandArgv:
        type: array
        items:
          type: string
        description: |-
          Exact tcpdump argv executed by StartPacketCapture. The server applies the
          duration bound without going through a shell.
      warnings:
        type: array
        items:
          type: string
      flowId:
        type: string
        description: Optional telemetry flow identifier supplied by the operator.
  openngfw.v1.PacketCaptureRetention:
    type: object
    properties:
      state:
        $ref: '#/definitions/openngfw.v1.PacketCaptureRetentionState'
      retainUntil:
        type: string
        description: |-
          Server-normalized UTC RFC3339Nano timestamp required for retained
          artifacts and cleared for released artifacts.
      retentionReason:
        type: string
        description: Bounded operator reason for the metadata update.
      caseId:
        type: string
        description: Optional incident/case label. It is not treated as a custody record.
      updatedAt:
        type: string
        description: Server timestamp for the last metadata update.
      updatedBy:
        type: string
        description: Server actor name for the last metadata update.
  openngfw.v1.PacketCaptureRetentionState:
    type: string
    enum:
      - PACKET_CAPTURE_RETENTION_STATE_UNSPECIFIED
      - PACKET_CAPTURE_RETENTION_STATE_RETAINED
      - PACKET_CAPTURE_RETENTION_STATE_RELEASED
    default: PACKET_CAPTURE_RETENTION_STATE_UNSPECIFIED
  openngfw.v1.PlanPacketCaptureRequest:
    type: object
    properties:
      interface:
        type: string
        description: |-
          Interface to capture on. Use "any" only when a specific ingress/egress
          interface is unknown.
      protocol:
        $ref: '#/definitions/openngfw.v1.Protocol'
      srcIp:
        type: string
      srcPort:
        type: integer
        format: int64
      destIp:
        type: string
      destPort:
        type: integer
        format: int64
      durationSeconds:
        type: integer
        format: int64
        description: Bounded capture duration. Server clamps to the supported range.
      packetCount:
        type: integer
        format: int64
        description: Maximum packet count. Server clamps to the supported range.
      snaplenBytes:
        type: integer
        format: int64
        description: Snap length in bytes. Server clamps to the supported range.
      label:
        type: string
        description: Human label used only for the output filename.
      flowId:
        type: string
        description: |-
          Optional telemetry flow identifier preserved with the capture metadata so
          Explain can correlate completed artifacts with EVE flow/alert evidence.
  openngfw.v1.PlanPacketCaptureResponse:
    type: object
    properties:
      plan:
        $ref: '#/definitions/openngfw.v1.PacketCapturePlan'
  openngfw.v1.Policy:
    type: object
    properties:
      zones:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.Zone'
      addresses:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.Address'
      services:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.Service'
      rules:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.Rule'
      nat:
        $ref: '#/definitions/openngfw.v1.Nat'
      staticRoutes:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.StaticRoute'
      ids:
        $ref: '#/definitions/openngfw.v1.Ids'
      telemetry:
        $ref: '#/definitions/openngfw.v1.Telemetry'
      routing:
        $ref: '#/definitions/openngfw.v1.Routing'
      vpn:
        $ref: '#/definitions/openngfw.v1.Vpn'
      intel:
        $ref: '#/definitions/openngfw.v1.Intel'
      network:
        $ref: '#/definitions/openngfw.v1.Network'
      hostInput:
        $ref: '#/definitions/openngfw.v1.HostInput'
      applications:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.Application'
        description: |-
          Custom OpenNGFW App-ID definitions. These enrich flow classification,
          evidence, and the v1 deny-rule port-hint enforcement path.
      securityProfiles:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.SecurityProfile'
        description: |-
          Reusable security inspection intents attached to rules. These are
          declarative policy objects; renderer/runtime enforcement is feature-
          specific and must not silently perform TLS interception.
      proxy:
        $ref: '#/definitions/openngfw.v1.Proxy'
        description: |-
          Bounded L7 virtual-service, WAF, and API gateway intent. This policy
          section renders an Envoy/Coraza-style deployment plan for review and
          readiness workflows; it does not activate a traffic proxy by itself.
      qosProfiles:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.QosProfile'
        description: |-
          Reusable traffic shaping intent attached to forwarding rules. The current
          Linux renderer emits deterministic plan-only posture; live tc/nft proof
          remains production hardening.
      zoneProtectionProfiles:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.ZoneProtectionProfile'
        description: |-
          Reusable zone-protection intent attached to zones. The current Linux
          renderer emits deterministic plan-only posture; live DoS enforcement and
          scale proof remain production hardening.
    description: Policy is the complete declarative configuration of one node.
  openngfw.v1.PolicyDiffLine:
    type: object
    properties:
      type:
        $ref: '#/definitions/openngfw.v1.PolicyDiffLineType'
      text:
        type: string
  openngfw.v1.PolicyDiffLineType:
    type: string
    enum:
      - POLICY_DIFF_LINE_TYPE_UNSPECIFIED
      - POLICY_DIFF_LINE_TYPE_CONTEXT
      - POLICY_DIFF_LINE_TYPE_ADD
      - POLICY_DIFF_LINE_TYPE_DELETE
    default: POLICY_DIFF_LINE_TYPE_UNSPECIFIED
  openngfw.v1.PolicyObjectKind:
    type: string
    enum:
      - POLICY_OBJECT_KIND_UNSPECIFIED
      - POLICY_OBJECT_KIND_ZONE
      - POLICY_OBJECT_KIND_ADDRESS
      - POLICY_OBJECT_KIND_SERVICE
      - POLICY_OBJECT_KIND_APPLICATION
      - POLICY_OBJECT_KIND_SECURITY_PROFILE
      - POLICY_OBJECT_KIND_QOS_PROFILE
      - POLICY_OBJECT_KIND_ZONE_PROTECTION_PROFILE
    default: POLICY_OBJECT_KIND_UNSPECIFIED
  openngfw.v1.PolicyObjectReference:
    type: object
    properties:
      objectName:
        type: string
        description: Referenced object name.
      area:
        type: string
        description: Human-readable policy area, e.g. "security rule" or "destination NAT".
      item:
        type: string
        description: Referencing item name, or a stable "#N" fallback.
      index:
        type: integer
        format: int64
        description: Zero-based index of the referencing item in its policy list.
      field:
        type: string
        description: Human-readable referenced field, e.g. "destination address".
      detail:
        type: string
        description: Short operator-facing explanation of the policy coupling.
      itemId:
        type: string
        description: |-
          Durable id of the referencing item when available. Security rules carry
          Rule.id here so API/UI callers can target by identity instead of position.
  openngfw.v1.PolicyService.PreviewBackupSnapshotRestoreBody:
    type: object
    properties:
      comment:
        type: string
        description: Required when stage_candidate is true; recorded in the candidate audit log.
      stageCandidate:
        type: boolean
        description: |-
          If true, stage the snapshot into candidate after validation succeeds.
          This never applies engines or changes running policy.
      expectedCandidateRevision:
        type: string
        description: Optional optimistic-concurrency guard for the candidate workspace.
  openngfw.v1.PolicyService.UpsertCandidateDestinationNatBody:
    type: object
    properties:
      rule:
        $ref: '#/definitions/openngfw.v1.DestinationNat'
      expectedCandidateRevision:
        type: string
        description: Required optimistic-concurrency guard from GetCandidateStatusResponse.
      comment:
        type: string
        description: Operator audit comment. Either comment or reason must be supplied.
      reason:
        type: string
        description: Optional structured reason recorded alongside the audit comment.
  openngfw.v1.PolicyService.UpsertCandidateSourceNatBody:
    type: object
    properties:
      rule:
        $ref: '#/definitions/openngfw.v1.SourceNat'
      expectedCandidateRevision:
        type: string
        description: Required optimistic-concurrency guard from GetCandidateStatusResponse.
      comment:
        type: string
        description: Operator audit comment. Either comment or reason must be supplied.
      reason:
        type: string
        description: Optional structured reason recorded alongside the audit comment.
  openngfw.v1.PolicyService.ValidateBackupSnapshotBody:
    type: object
  openngfw.v1.PolicySource:
    type: string
    enum:
      - POLICY_SOURCE_UNSPECIFIED
      - POLICY_SOURCE_RUNNING
      - POLICY_SOURCE_CANDIDATE
      - POLICY_SOURCE_VERSION
    default: POLICY_SOURCE_UNSPECIFIED
  openngfw.v1.PortRange:
    type: object
    properties:
      start:
        type: integer
        format: int64
      end:
        type: integer
        format: int64
    description: PortRange matches a single port (end unset/0) or an inclusive range.
  openngfw.v1.PreviewBackupSnapshotRestoreResponse:
    type: object
    properties:
      jobId:
        type: string
      snapshot:
        $ref: '#/definitions/openngfw.v1.BackupSnapshot'
      validation:
        $ref: '#/definitions/openngfw.v1.ValidateResponse'
      diff:
        $ref: '#/definitions/openngfw.v1.DiffPolicyResponse'
      stagedCandidate:
        type: boolean
      candidateStatus:
        $ref: '#/definitions/openngfw.v1.GetCandidateStatusResponse'
      detail:
        type: string
  openngfw.v1.PreviewContentPackageResponse:
    type: object
    properties:
      package:
        $ref: '#/definitions/openngfw.v1.ContentPackageInfo'
      detail:
        type: string
  openngfw.v1.Protocol:
    type: string
    enum:
      - PROTOCOL_UNSPECIFIED
      - PROTOCOL_TCP
      - PROTOCOL_UDP
      - PROTOCOL_ICMP
      - PROTOCOL_ANY
    default: PROTOCOL_UNSPECIFIED
    description: ' - PROTOCOL_ANY: PROTOCOL_ANY matches any IP protocol; ports must be empty.'
  openngfw.v1.ProveNetworkPathRequest:
    type: object
    properties:
      srcIp:
        type: string
        description: Representative source IP for kernel route lookup.
      destIp:
        type: string
        description: Representative destination IP for kernel route lookup.
      protocol:
        $ref: '#/definitions/openngfw.v1.Protocol'
        description: Optional protocol label for operator context.
      destPort:
        type: integer
        format: int64
        description: Optional destination port for operator context.
      sourceInterface:
        type: string
        description: |-
          Optional expected source interface. When set, the proof reports a warning
          if the kernel route lookup returns a different device.
      tunnel:
        $ref: '#/definitions/openngfw.v1.NetworkPathTunnelRef'
        description: Optional tunnel reference for passive VPN runtime correlation.
      expectedMasqueradeEgressIp:
        type: string
        description: |-
          Optional expected egress source IP after source-NAT/masquerade. Empty keeps
          the proof observational and reports only the kernel-selected preferred
          source, if the host exposes one.
  openngfw.v1.ProveNetworkPathResponse:
    type: object
    properties:
      schemaVersion:
        type: string
      generatedAt:
        type: string
      state:
        type: string
        description: ready, degraded, unavailable, or unknown.
      detail:
        type: string
      runningPolicyVersion:
        type: string
        format: uint64
      route:
        $ref: '#/definitions/openngfw.v1.NetworkPathRouteProof'
      vpn:
        $ref: '#/definitions/openngfw.v1.NetworkPathVpnProof'
      evidence:
        type: array
        items:
          type: string
      warnings:
        type: array
        items:
          type: string
      mismatches:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.NetworkPathMismatch'
        description: |-
          Structured mismatch records for operators and automation. Warning strings
          are retained for compatibility with existing clients.
      limitations:
        type: array
        items:
          type: string
        description: |-
          Explicit proof boundaries. This passive proof does not send traffic,
          attest the remote peer, capture packets, or sign/retain custody records.
      cliHandoff:
        type: string
        description: Copyable handoff strings for operator shells and API clients.
      apiHandoff:
        type: string
  openngfw.v1.Proxy:
    type: object
    properties:
      virtualServices:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.VirtualService'
      wafPolicies:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.WafPolicy'
    description: |-
      Proxy contains bounded L7 reverse-proxy intent. It is intentionally separate
      from L3/L4 forwarding rules so operators can review listener, WAF, and
      backend posture before any active proxy rollout exists.
  openngfw.v1.ProxyBackend:
    type: object
    properties:
      name:
        type: string
      url:
        type: string
      weight:
        type: integer
        format: int64
  openngfw.v1.ProxyListener:
    type: object
    properties:
      bindAddress:
        type: string
      port:
        type: integer
        format: int64
      tls:
        type: boolean
      tlsSecretRef:
        type: string
        description: |-
          Secret reference only. Certificate/private-key material is never stored in
          policy; production key custody remains an external hardening control.
  openngfw.v1.ProxyRoute:
    type: object
    properties:
      name:
        type: string
      pathPrefix:
        type: string
      backends:
        type: array
        items:
          type: object
          $ref: '#/definitions/openngfw.v1.ProxyBackend'
      wafPolicy:
        type: string
      requireMtlsToBackend:
        type: boolean
      stripPrefix:
        type: boolean
  openngfw.v1.PullHighAvailabilityPolicyRequest:
    type: object
    properties:
      comment:
        type: string
        description: Required audit comment explaining why this passive node is pulling policy.
      ackPull:
        type: boolean
        description: |-
          Required acknowledgement that the operator intends to replace the local
          running policy from the active peer.
      ackRisk:
        type: boolean
        description: Passed through to the normal policy apply path for high-risk changes.
      ackRuntime:
        type: boolean
        description: |-
          Passed through to the normal policy apply path for runtime readiness
          warnings.
  openngfw.v1.PullHighAvailabilityPolicyResponse:
    type: object
    properties:
      version:
        type: string
        format: uint64
      previousVersion:
        type: string
        format: uint64
      versionInfo:
        $ref: '#/definitions/openngfw.v1.VersionInfo'
      before:
        $ref: '#/definitions/openngfw.v1.HighAvailabilityStatus'
      after:
        $ref: '#/definitions/openngfw.v1.HighAvailabilityStatus'
      peerVersion:
        type: string
        format: uint64
      peerArtifactSetSha256:
        type: string
      detail:
        type: string
  openngfw.v1.QosPriority:
    type: string
    enum:
      - QOS_PRIORITY_UNSPECIFIED
      - QOS_PRIORITY_LOW
      - QOS_PRIORITY_MEDIUM
      - QOS_PRIORITY_HIGH
      - QOS_PRIORITY_CRITICAL
    default: QOS_PRIORITY_UNSPECIFIED
  openngfw.v1.QosProfile:
    type: object
    properties:
      name:
        type: string
      description:
        type: string
      maxBandwidthKbps:
        type: string
        format: uint64
      guaranteedBandwidthKbps:
        type: string
        format: uint64
      priority:
        $ref: '#/definitions/openngfw.v1.QosPriority'
      dscpMark:
        type: integer
        format: int64
        description: DSCP value 0-63. The default 0 means no marking intent.
      burstKbytes:
        type: integer
        format: int64
        description: |-
          Token-bucket burst intent in KiB. The default 0 lets the future runtime
          derive a bounded value from rate and interface posture.
    description: |-
      QosProfile declares bounded shaping intent for rule-matched traffic. It does
      not by itself certify Linux tc enforcement, queue discipline selection, HA
      synchronization, or telemetry SLAs.
  openngfw.v1.RefreshFeedsResponse:
    type: object
    properties:
      entries:
        type: integer
        format: int64
        description: Entries programmed into the blocklist sets.
      refreshedAt:
        type: string
        format: date-time
  openngfw.v1.ReleaseAcceptanceCheckStatus:
    type: object
    properties:
      name:
        type: string
      state:
        type: string
      artifact:
        type: string
      evidencePath:
        type: string
      ranAt:
        type: string
      detail:
        type: string
      command:
        type: array
        items:
          type: string
        description: |-
          Evidence command from the recorded artifact. Empty when evidence has not
          been recorded.
      problems:
        type: array
        items:
          type: string
      nextAction:
        type: string
        description: |-
          Human-readable remediation guidance for the current state. This is not
          evidence and must not be treated as proof that a check passed.
      nextCommand:
        type: array
        items:
          type: string
        description: |-
          Copyable argv for the next evidence-recording step when one is safe to
          suggest. Placeholder arguments must be replaced before running.
      benchmarkSummary:
        type: string
  openngfw.v1.ReleaseAcceptanceRecordabilityStatus:
    type: object
    properties:
      ready:
        type: boolean
        description: Mirrors releaseacceptance.RecordabilityStatus.
      gitHead:
        type: string
      recordCommit:
        type: string
      allowedDirtyPaths:
        type: array
        items:
          type: string
      dirtySourcePaths:
        type: array
        items:
          type: string
      problems:
        type: array
        items:
          type: string
      truncatedDirtySourceCount:
        type: integer
        format: int64
        description: |-
          Deprecated compatibility field for existing support-bundle summaries.
          The status API now returns the full dirty_source_paths list.
      staleEvidencePaths:
        type: array
        items:
          type: string
  openngfw.v1.ReleaseAcceptanceStatusSummary:
    type: object
    properties:
      passed:
