        format: uint64
        description: New version created by the rollback commit.
      previousVersion:
        type: string
        format: uint64
        description: Running version before this rollback commit.
      versionInfo:
        $ref: '#/definitions/openngfw.v1.VersionInfo'
        description: Metadata for the newly activated rollback version.
  openngfw.v1.RotateLocalUserTokenResponse:
    type: object
    properties:
      user:
        $ref: '#/definitions/openngfw.v1.AccessAdministrationLocalUser'
      oneTimeToken:
        type: string
        description: |-
          Generated bearer token returned only once. It is never persisted in API
          state and is not returned by inventory endpoints.
      detail:
        type: string
  openngfw.v1.Routing:
    type: object
    properties:
      bgp:
        $ref: '#/definitions/openngfw.v1.Bgp'
      ospf:
        $ref: '#/definitions/openngfw.v1.Ospf'
  openngfw.v1.RoutingRuntimeStatus:
    type: object
    properties:
      frr:
        $ref: '#/definitions/openngfw.v1.FrrRuntimeStatus'
  openngfw.v1.Rule:
    type: object
    properties:
      name:
        type: string
      fromZones:
        type: array
        items:
          type: string
      toZones:
        type: array
        items:
          type: string
      sourceAddresses:
        type: array
        items:
          type: string
      destinationAddresses:
        type: array
        items:
          type: string
      services:
        type: array
        items:
          type: string
      action:
        $ref: '#/definitions/openngfw.v1.Action'
      log:
        type: boolean
      disabled:
        type: boolean
      description:
        type: string
      applications:
        type: array
        items:
          type: string
        description: |-
          Application references match OpenNGFW App-ID objects. The current dataplane
          expands referenced TCP/UDP port hints in nftables for allow/drop path
          control, and IDS/IPS Prevent fail-closed can render supported Suricata
          app-layer allow/drop controls with source/destination/port metadata scope.
          True proxy-grade L7 allow semantics, zone-aware Suricata controls, and full
          application taxonomy breadth remain hardening/follow-on work.
      tags:
        type: array
        items:
          type: string
        description: |-
          Operator-defined rule tags used for grouping, ownership, compliance,
          lifecycle, and GUI/API filtering. Tags are policy metadata; they do not
          change dataplane match semantics.
      securityProfiles:
        type: array
        items:
          type: string
        description: |-
          Reusable inspection/profile intents. Profiles with blocking intent on
          allow rules require inline IPS fail-closed; TLS decryption, URL category
          databases, and file-inspection engines remain separate integrations.
      id:
        type: string
        description: |-
          Durable server-normalized policy identity for API/UI targeting, audit
          correlation, compiler IR, and renderer metadata. Names remain
          operator-facing labels and may be changed; id is stable for the life of
          the logical forwarding rule. Legacy or imported rules without IDs are
          backfilled by candidate/commit/validation server paths.
      matchContext:
        $ref: '#/definitions/openngfw.v1.RuleMatchContext'
        description: |-
          Optional bounded User-ID and device-posture policy context. This context
          is part of the OpenNGFW rule match model and ExplainFlow simulation
          surface; it does not by itself configure live directory, group freshness,
          MDM, or step-up authentication integrations.
      qosProfile:
        type: string
        description: |-
          Optional reusable QoS/shaping intent for matching traffic. The v1 runtime
          exposes this as plan-only metadata until tc/nft field proof is complete.
    description: |-
      Rule is a stateful zone-pair filtering rule. Rules are evaluated in
      list order; the first match wins. Reference values are object names;
      the literal "any" is allowed everywhere a name is.
  openngfw.v1.RuleMatchContext:
    type: object
    properties:
      users:
        type: array
        items:
          type: string
      groups:
        type: array
        items:
          type: string
      devices:
        type: array
        items:
          type: string
      postureLabels:
        type: array
        items:
          type: string
    description: |-
      RuleMatchContext constrains a rule by identity and endpoint posture labels.
      Values are canonical OpenNGFW labels, not live provider records. Empty lists
      mean that dimension is not constrained; when a dimension is present, a flow
      explanation must supply at least one matching value for that dimension.
  openngfw.v1.RunOIDCPreflightRequest:
    type: object
  openngfw.v1.RunOIDCPreflightResponse:
    type: object
    properties:
