name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: make build
      - name: Test
        run: make test
      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
      - name: Vet
        run: go vet ./...
      - name: Smoke-test binaries report version
        run: |
          ./bin/controld --version
          ./bin/ngfwctl version

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install engines
        run: sudo apt-get update -q && sudo apt-get install -y -q nftables suricata frr netcat-openbsd
      - name: Build integration test binary
        run: go test -c -tags integration -o /tmp/openngfw-itest ./test/integration
      - name: Run real-engine integration tests (root)
        run: sudo /tmp/openngfw-itest -test.v -test.timeout 300s

  proto-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify committed generated code is current
        run: make proto-verify

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: sbom.spdx.json

  dco:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off on all PR commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=0
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA" --no-merges); do
            if ! git log -1 --format=%B "$sha" | grep -qi '^Signed-off-by: .\+<.\+>'; then
              echo "::error::Commit $sha is missing a Signed-off-by line (use 'git commit -s')."
              missing=1
            fi
          done
          exit $missing
