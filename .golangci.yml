version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - misspell
    - revive
    - unconvert
    - unparam
  exclusions:
    paths:
      # Generated code is exempt from lint; regenerate via `make proto`.
      - api/gen

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - api/gen
