version: v2
clean: true
managed:
  enabled: true
  disable:
    # Vendored googleapis protos map to the published genproto package.
    - file_option: go_package
      module: buf.build/googleapis/googleapis
plugins:
  - local: protoc-gen-go
    out: api/gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: api/gen
    opt: paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: api/gen
    opt: paths=source_relative
inputs:
  - directory: api/proto
    exclude_paths:
      - api/proto/google
